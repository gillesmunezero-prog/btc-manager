<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Manager - Terre et Eau</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
<style>
:root{
  --btp-dark:#0D1B2A;
  --btp-navy:#1B2838;
  --btp-steel:#243447;
  --btp-orange:#E8601C;
  --btp-orange2:#FF7A3D;
  --btp-gold:#F0A500;
  --btp-green:#1DB954;
  --btp-red:#E74C3C;
  --btp-blue:#2980B9;
  --btp-purple:#8E44AD;
  --btp-text:#ECF0F1;
  --btp-text2:#BDC3C7;
  --btp-card:#1E2D3D;
  --btp-card2:#253545;
  --btp-border:#2C3E50;
  --btp-shadow:0 8px 32px rgba(0,0,0,.45);
  --btp-shadow2:0 4px 16px rgba(0,0,0,.3);
  --btp-radius:12px;
  --btp-radius2:8px;
  --btp-font:"Segoe UI",system-ui,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--btp-font);background:var(--btp-dark);color:var(--btp-text);min-height:100vh;}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--btp-dark);}
::-webkit-scrollbar-thumb{background:var(--btp-orange);border-radius:3px;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--btp-orange);}50%{box-shadow:0 0 24px var(--btp-orange2),0 0 48px rgba(232,96,28,.3);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade-up{animation:fadeUp .3s ease both;}
.slide-in{animation:slideIn .25s ease both;}
.pulse{animation:pulse 2s ease-in-out infinite;}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* APP SHELL */
.btp-app{min-height:100vh;background:linear-gradient(135deg,var(--btp-dark) 0%,var(--btp-navy) 100%);}

/* HEADER */
.btp-header{
  background:linear-gradient(90deg,var(--btp-steel) 0%,var(--btp-navy) 100%);
  border-bottom:2px solid var(--btp-orange);
  padding:0 20px;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,.5);
}
.btp-header-logo{display:flex;align-items:center;gap:12px;}
.btp-header-logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--btp-orange),var(--btp-gold));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 4px 12px rgba(232,96,28,.4);
}
.btp-header-title{font-size:18px;font-weight:800;letter-spacing:.5px;color:white;}
.btp-header-sub{font-size:11px;color:var(--btp-text2);letter-spacing:1px;text-transform:uppercase;}
.btp-header-right{display:flex;align-items:center;gap:12px;}
.btp-user-chip{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:6px 14px;
  font-size:13px;color:var(--btp-text2);
}
.btp-user-chip strong{color:white;}

/* MODE BADGE */
.mode-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  transition:all .2s;border:2px solid;
}
.mode-badge-demo{
  background:rgba(240,165,0,.15);border-color:var(--btp-gold);
  color:var(--btp-gold);animation:glow 2s ease-in-out infinite;
}
.mode-badge-real{
  background:rgba(29,185,84,.12);border-color:var(--btp-green);
  color:var(--btp-green);
}
.mode-badge-dot{width:8px;height:8px;border-radius:50%;}
.mode-badge-demo .mode-badge-dot{background:var(--btp-gold);}
.mode-badge-real .mode-badge-dot{background:var(--btp-green);}

/* NAV TABS */
.btp-nav{
  background:var(--btp-navy);
  border-bottom:1px solid var(--btp-border);
  padding:0 20px;
  display:flex;overflow-x:auto;gap:2px;
}
.btp-nav::-webkit-scrollbar{height:0;}
.btp-nav-btn{
  background:none;border:none;
  color:var(--btp-text2);font-size:13px;font-weight:600;
  padding:14px 18px;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.btp-nav-btn:hover{color:white;background:rgba(255,255,255,.05);}
.btp-nav-btn.active{
  color:var(--btp-orange2);
  border-bottom-color:var(--btp-orange);
  background:rgba(232,96,28,.08);
}

/* CARDS */
.btp-card{
  background:var(--btp-card);
  border:1px solid var(--btp-border);
  border-radius:var(--btp-radius);
  padding:20px;
  box-shadow:var(--btp-shadow2);
  transition:transform .2s,box-shadow .2s;
}
.btp-card:hover{box-shadow:var(--btp-shadow);}
.btp-card-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;padding-bottom:14px;
  border-bottom:1px solid var(--btp-border);
}
.btp-card-title{font-size:15px;font-weight:700;color:white;}
.btp-card-subtitle{font-size:12px;color:var(--btp-text2);margin-top:2px;}

/* KPI CARDS */
.kpi-card{
  background:linear-gradient(135deg,var(--btp-card) 0%,var(--btp-card2) 100%);
  border:1px solid var(--btp-border);
  border-radius:var(--btp-radius);
  padding:20px 22px;
  position:relative;overflow:hidden;
}
.kpi-card::before{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:80px;border-radius:50%;
  opacity:.08;transform:translate(20px,-20px);
}
.kpi-card-icon{font-size:28px;margin-bottom:8px;}
.kpi-card-value{font-size:28px;font-weight:900;color:white;line-height:1.1;}
.kpi-card-label{font-size:12px;color:var(--btp-text2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px;}
.kpi-card-trend{
  position:absolute;top:16px;right:16px;
  font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;
}
.kpi-card-orange{border-top:3px solid var(--btp-orange);}
.kpi-card-green{border-top:3px solid var(--btp-green);}
.kpi-card-blue{border-top:3px solid var(--btp-blue);}
.kpi-card-gold{border-top:3px solid var(--btp-gold);}
.kpi-card-red{border-top:3px solid var(--btp-red);}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 18px;border-radius:var(--btp-radius2);
  font-size:13px;font-weight:700;cursor:pointer;
  border:none;transition:all .2s;letter-spacing:.3px;
  text-decoration:none;outline:none;
}
.btn:active{transform:scale(.97);}
.btn-primary{
  background:linear-gradient(135deg,var(--btp-orange),var(--btp-orange2));
  color:white;box-shadow:0 4px 12px rgba(232,96,28,.35);
}
.btn-primary:hover{box-shadow:0 6px 20px rgba(232,96,28,.5);transform:translateY(-1px);}
.btn-success{
  background:linear-gradient(135deg,#1a7a3a,var(--btp-green));
  color:white;box-shadow:0 4px 12px rgba(29,185,84,.3);
}
.btn-success:hover{box-shadow:0 6px 20px rgba(29,185,84,.45);transform:translateY(-1px);}
.btn-danger{
  background:linear-gradient(135deg,#c0392b,var(--btp-red));
  color:white;box-shadow:0 4px 12px rgba(231,76,60,.3);
}
.btn-danger:hover{box-shadow:0 6px 20px rgba(231,76,60,.45);transform:translateY(-1px);}
.btn-ghost{
  background:rgba(255,255,255,.06);border:1px solid var(--btp-border);
  color:var(--btp-text2);
}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:white;}
.btn-gold{
  background:linear-gradient(135deg,#b8860b,var(--btp-gold));
  color:#0D1B2A;
}
.btn-gold:hover{box-shadow:0 6px 20px rgba(240,165,0,.4);transform:translateY(-1px);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-lg{padding:13px 24px;font-size:15px;}
.btn-full{width:100%;}
.btn-icon{padding:8px;border-radius:8px;}
.btn-reset-demo{
  background:linear-gradient(135deg,#7d3c98,var(--btp-purple));
  color:white;box-shadow:0 4px 12px rgba(142,68,173,.35);
  animation:pulse 2s ease-in-out infinite;
}
.btn-reset-demo:hover{box-shadow:0 6px 20px rgba(142,68,173,.5);transform:translateY(-1px);animation:none;}

/* INPUTS */
.btp-input{
  width:100%;background:var(--btp-steel);
  border:1.5px solid var(--btp-border);border-radius:var(--btp-radius2);
  padding:10px 14px;color:white;font-size:14px;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.btp-input:focus{border-color:var(--btp-orange);box-shadow:0 0 0 3px rgba(232,96,28,.15);}
.btp-input::placeholder{color:rgba(189,195,199,.4);}
.btp-label{font-size:12px;font-weight:700;color:var(--btp-text2);margin-bottom:6px;
  display:block;text-transform:uppercase;letter-spacing:.5px;}

/* SELECT */
.btp-select{
  width:100%;background:var(--btp-steel);
  border:1.5px solid var(--btp-border);border-radius:var(--btp-radius2);
  padding:10px 14px;color:white;font-size:14px;
  transition:border-color .2s;outline:none;cursor:pointer;
}
.btp-select:focus{border-color:var(--btp-orange);box-shadow:0 0 0 3px rgba(232,96,28,.15);}
.btp-select option{background:var(--btp-steel);}

/* TABLES */
.btp-table-wrap{overflow-x:auto;border-radius:var(--btp-radius);border:1px solid var(--btp-border);}
.btp-table{width:100%;border-collapse:collapse;font-size:13px;}
.btp-table th{
  background:var(--btp-steel);color:var(--btp-text2);
  padding:12px 14px;text-align:left;font-size:11px;
  font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  border-bottom:2px solid var(--btp-border);white-space:nowrap;
}
.btp-table td{
  padding:12px 14px;border-bottom:1px solid rgba(44,62,80,.6);
  color:var(--btp-text);vertical-align:middle;
}
.btp-table tr:last-child td{border-bottom:none;}
.btp-table tbody tr:hover{background:rgba(255,255,255,.04);}
.btp-table tr.demo-row{background:rgba(240,165,0,.06)!important;}

/* BADGES */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
}
.badge-orange{background:rgba(232,96,28,.15);color:var(--btp-orange2);border:1px solid rgba(232,96,28,.25);}
.badge-green{background:rgba(29,185,84,.12);color:#2ecc71;border:1px solid rgba(29,185,84,.25);}
.badge-red{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.25);}
.badge-blue{background:rgba(41,128,185,.12);color:#5dade2;border:1px solid rgba(41,128,185,.25);}
.badge-gold{background:rgba(240,165,0,.12);color:var(--btp-gold);border:1px solid rgba(240,165,0,.25);}
.badge-purple{background:rgba(142,68,173,.12);color:#bb8fce;border:1px solid rgba(142,68,173,.25);}
.badge-gray{background:rgba(255,255,255,.06);color:var(--btp-text2);border:1px solid var(--btp-border);}
.badge-demo{background:rgba(240,165,0,.2);color:var(--btp-gold);border:1px solid var(--btp-gold);}

/* PROGRESS BAR */
.btp-progress{height:8px;background:var(--btp-border);border-radius:4px;overflow:hidden;}
.btp-progress-bar{height:100%;border-radius:4px;transition:width .4s ease;}

/* STOCK INDICATOR */
.stock-level-ok .btp-progress-bar{background:linear-gradient(90deg,var(--btp-green),#58d68d);}
.stock-level-warn .btp-progress-bar{background:linear-gradient(90deg,var(--btp-gold),#f8c471);}
.stock-level-low .btp-progress-bar{background:linear-gradient(90deg,var(--btp-red),#f1948a);}

/* DEMO BANNER */
.demo-banner{
  background:linear-gradient(90deg,rgba(240,165,0,.15),rgba(232,96,28,.1),rgba(240,165,0,.15));
  border-top:1px solid var(--btp-gold);border-bottom:1px solid var(--btp-gold);
  padding:10px 20px;display:flex;align-items:center;justify-content:space-between;
  background-size:200% 100%;animation:shimmer 3s linear infinite;
}
.demo-banner-text{font-size:13px;color:var(--btp-gold);font-weight:700;letter-spacing:.5px;}

/* MODAL */
.btp-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  animation:fadeUp .2s ease;backdrop-filter:blur(4px);
}
.btp-modal{
  background:var(--btp-card);border:1px solid var(--btp-border);
  border-radius:16px;padding:28px;width:90%;max-width:520px;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:fadeUp .25s ease;
}
.btp-modal-title{font-size:18px;font-weight:800;color:white;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;}

/* FORM GROUP */
.form-group{margin-bottom:16px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* SECTION HEADER */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.section-title{font-size:20px;font-weight:900;color:white;
  display:flex;align-items:center;gap:10px;}
.section-title-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--btp-orange),var(--btp-gold));
  display:flex;align-items:center;justify-content:center;font-size:18px;
}

/* CONTENT AREA */
.btp-content{padding:24px;max-width:1400px;margin:0 auto;}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}

/* STATUS COLORS */
.text-orange{color:var(--btp-orange2);}
.text-green{color:#2ecc71;}
.text-red{color:var(--btp-red);}
.text-gold{color:var(--btp-gold);}
.text-blue{color:#5dade2;}
.text-gray{color:var(--btp-text2);}

/* LOGIN SCREEN */
.login-screen{
  min-height:100vh;
  background:linear-gradient(135deg,#0D1B2A 0%,#1B2838 50%,#0D1B2A 100%);
  display:flex;align-items:center;justify-content:center;
}
.login-card{
  background:var(--btp-card);border:1px solid var(--btp-border);
  border-radius:20px;padding:40px;width:90%;max-width:420px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);animation:fadeUp .4s ease;
  position:relative;overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,96,28,.15),transparent);
}
.login-logo{
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,var(--btp-orange),var(--btp-gold));
  display:flex;align-items:center;justify-content:center;font-size:32px;
  margin:0 auto 20px;box-shadow:0 8px 24px rgba(232,96,28,.4);
}
.login-title{text-align:center;font-size:24px;font-weight:900;color:white;margin-bottom:4px;}
.login-sub{text-align:center;font-size:13px;color:var(--btp-text2);margin-bottom:28px;}

/* ALERT */
.btp-alert{
  padding:12px 16px;border-radius:var(--btp-radius2);
  font-size:13px;font-weight:600;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.alert-error{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:#e74c3c;}
.alert-success{background:rgba(29,185,84,.12);border:1px solid rgba(29,185,84,.3);color:#2ecc71;}
.alert-warning{background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);color:var(--btp-gold);}
.alert-info{background:rgba(41,128,185,.12);border:1px solid rgba(41,128,185,.3);color:#5dade2;}

/* TOGGLE SWITCH */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.toggle{position:relative;width:48px;height:26px;cursor:pointer;}
.toggle input{display:none;}
.toggle-track{
  position:absolute;inset:0;border-radius:13px;
  background:var(--btp-border);transition:background .2s;
}
.toggle input:checked+.toggle-track{background:var(--btp-green);}
.toggle-thumb{
  position:absolute;top:3px;left:3px;
  width:20px;height:20px;border-radius:50%;
  background:white;transition:transform .2s;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.toggle input:checked~.toggle-thumb{transform:translateX(22px);}

/* EMPTY STATE */
.empty-state{
  text-align:center;padding:48px 20px;
  color:var(--btp-text2);
}
.empty-state-icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.empty-state-text{font-size:15px;font-weight:600;color:var(--btp-text);}
.empty-state-sub{font-size:13px;margin-top:4px;}

/* SEPARATOR */
.btp-sep{height:1px;background:var(--btp-border);margin:16px 0;}

/* PRINT STYLES */
@media print{
  .btp-header,.btp-nav,.no-print{display:none!important;}
  body{background:white!important;color:black!important;}
  .btp-content{padding:0!important;}
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid-4{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
  .btp-content{padding:14px;}
  .btp-header{height:56px;}
  .btp-header-title{font-size:15px;}
}
</style>
</head>

const TYPES_BTC = CATALOGUE.map(function(p) { return p.id; });
const STOCK_CIBLE = 10000;
const STOCK_ALERTE = 7500;
const DUREE_SECHAGE = 28;
const MS_PAR_JOUR = 86400000;

function couleurUrgence(total) {
  if (total < STOCK_ALERTE) return "#C0392B";
  if (total < STOCK_CIBLE) return "#E67E22";
  return "#27AE60";
}
function libelleUrgence(total) {
  if (total < STOCK_ALERTE) return "ALERTE";
  if (total < STOCK_CIBLE) return "A PRODUIRE";
  return "OK";
}
function joursRestants(dateTs) {
if (!dateTs) return 0;
var d = dateTs.toDate ? dateTs.toDate() : new Date(dateTs);
return Math.max(0, DUREE_SECHAGE - Math.floor((Date.now()-d.getTime())/MS_PAR_JOUR));
}
function calcSechageActif(prods, typeId) {
var now28 = Date.now() - DUREE_SECHAGE*MS_PAR_JOUR;
var actif = 0;
prods.forEach(function(p) {
if (p.type!==typeId||p.phase!=='sechage') return;
var d = p.timestamp&&p.timestamp.toDate ? p.timestamp.toDate().getTime() : 0;
if (d && d>now28) actif += (p.quantite||0);
});
return actif;
}
function getProduit(id) {
  return CATALOGUE.find(function(p) { return p.id === id; }) || { nom: id, dim: "", prix: 0 };
}


function Login() {

  async function handleLogin(e) {
    e.preventDefault();

    try {
      await auth.signInWithEmailAndPassword(email.trim(), password);
    } catch(err) {
      var msgs = {
        "auth/user-not-found": "Compte introuvable",

  const [qteNonConformeInput, setQteNonConformeInput] = React.useState({});

  var cmdCh = commandes.filter(function(c){ return c.chantierId === chantier.id; });
  var besoins = chantier.besoins || {};
  var typesChantier = CATALOGUE.filter(function(p){ return (besoins[p.id]||0) > 0; });

  // Résumé par type
  var lignes = typesChantier.map(function(prod) {
    var besoin = besoins[prod.id] || 0;
    var cmdTotal = cmdCh.filter(function(c){ return c.type===prod.id; }).reduce(function(a,c){ return a+(c.quantite||0); }, 0);
    var recu = cmdCh.filter(function(c){ return c.type===prod.id; }).reduce(function(a,c){ return a+(c.quantiteLivree||0); }, 0);
    var reste = Math.max(0, besoin - recu);
    return { prod:prod, besoin:besoin, cmdTotal:cmdTotal, recu:recu, reste:reste };
  });

  var passerCommande = async function() {
    if (!cmdType||!cmdQte) { setMsgCmd("Choisissez un type et entrez la quantite"); return; }
    try {
      // Générer numéro BC unique
      var now = new Date();
      var yyyy = now.getFullYear();
      var mm = String(now.getMonth()+1).padStart(2,"0");
      var rand = Math.floor(1000+Math.random()*9000);
      var numBC = "BC-"+yyyy+mm+"-"+rand;
      var catItem = CATALOGUE.find(function(p){return p.id===cmdType;})||{};
      await db.collection("commandes").add({
        numBC: numBC,
        type: cmdType, typNom: catItem.nom||cmdType, quantite: parseInt(cmdQte), notes: cmdNotes,
        chantierId: chantier.id, chantierNom: chantier.nom, client: chantier.client,
        chefUid: user.uid, chefEmail: user.email, chefNom: userData.nom||user.email,
        status: "EnAttente", quantiteLivree: 0,
        prixUnit: catItem.prix||0,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      try { await db.collection("evenements").add({ numBC: numBC, chantier: cmdChantierNom||"", action: "Commande créée", acteur: userData.nom||user.email, role: "direction", details: "N°"+numBC+" | BTC: "+cmdType+" | Qté: "+cmdQte, statut: "En attente validation Direction", timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
      setMsgCmd("Commande envoyée ! Bon de commande "+numBC+" créé. En attente de validation Direction.");
      setCmdQte(""); setCmdNotes(""); setCmdType("");
      setTabFiche("suivi");
    } catch(e) { setMsgCmd("Erreur: "+e.message); }
  };

  var validerReception = async function(cmdId, qteRecue, nonConforme) {
    var cmd = cmdCh.find(function(c){return c.id===cmdId;});
    if (!cmd) return;
    var cmdQteTotal = (cmd.quantite||0);
    var deja = (cmd.quantiteConfirmeeChef||0);
    var nouveauTotal = Math.min(deja + qteRecue, cmdQteTotal);
    var newStatus = (nouveauTotal >= cmdQteTotal) ? "Livree" : cmd.status;
    var nc = parseInt(nonConforme)||0;
    var prix = 0;
    var catItem = CATALOGUE.find(function(p){return p.id===cmd.type;});
    if(catItem) prix = catItem.prix||0;
    var updateObj = { quantiteConfirmeeChef:nouveauTotal, chefConfirmeAt:firebase.firestore.FieldValue.serverTimestamp(), status:newStatus };
    if(nc>0){ updateObj.qteNonConforme=(cmd.qteNonConforme||0)+nc; updateObj.montantNonConforme=((cmd.qteNonConforme||0)+nc)*prix; }
    await db.collection("commandes").doc(cmdId).update(updateObj);
    if(nc>0){
      try{
        await db.collection("pertes").add({
          type:cmd.type, quantite:nc, raison:"retour_nc",
          responsable:userData.nom||user.email, responsableUid:user.uid,
          source:"chantier", chantierNom:chantier.nom, cmdId:cmdId,
          timestamp:firebase.firestore.FieldValue.serverTimestamp()
        });
      try { await db.collection("evenements").add({ numBC: cmd.numBC||cmdId, chantier: chantier.nom||"", action: "Réception confirmée par chef", acteur: userData.nom||user.email, role: "chef_chantier", details: "N°"+(cmd.numBC||cmdId)+" | Qté reçue: "+(cmd.quantiteLivree||0)+" BTC | NC: "+nc, statut: "Réception confirmée", timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
      }catch(ep){}
    }
    var v={...qteNonConformeInput}; delete v[cmdId]; setQteNonConformeInput(v);
    setMsgCmd("Reception confirmee !");
  };

  var ts = function(t) { return { padding:"7px 14px", border:"none", cursor:"pointer", borderRadius:8, marginRight:6,
    background:tabFiche===t?"#2980B9":"#D6EAF8", color:tabFiche===t?"white":"#1A5276", fontWeight:tabFiche===t?700:500, fontSize:13 }; };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.55)",zIndex:1000,overflowY:"auto",padding:16}}>
      <div style={{background:"var(--btp-card)",borderRadius:16,maxWidth:720,margin:"0 auto",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{background:"linear-gradient(90deg,#1A5276,#2980B9)",color:"white",padding:"16px 20px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{marginBottom:4,fontSize:18}}>{chantier.nom}</h2>
            <div style={{fontSize:13,opacity:.9}}>Client: {chantier.client}</div>
            {chantier.adresse&&<div style={{fontSize:12,opacity:.8}}>{chantier.adresse}</div>}
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14}}>✕ Fermer</button>
        </div>
        <div style={{padding:"12px 16px 0",display:"flex",flexWrap:"wrap"}}>
          <button style={ts("suivi")} onClick={()=>setTabFiche("suivi")}>📊 Suivi</button>
          <button style={ts("commande")} onClick={()=>setTabFiche("commande")}>+ Passer une commande</button>
          {(function(){var hasLiv=cmdCh.some(function(c){return (c.quantiteLivree||0)>0;});return(<button style={ts("reception")} onClick={()=>{if(hasLiv)setTabFiche("reception");}} disabled={!hasLiv} title={hasLiv?"":"En attente de livraison par le stock"} >{hasLiv?"✅ Valider réception":"🔒 Valider réception (en attente livraison)"}</button>);})()}
        </div>

        <div style={{padding:20}}>
          {msgCmd&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:12,fontSize:13,background:msgCmd.includes("envoyee")||msgCmd.includes("confirme")?"#EAFAF1":"#FFECEC",color:msgCmd.includes("envoyee")||msgCmd.includes("confirme")?"#1E8449":"#C0392B"}}>{msgCmd}</div>}

          {tabFiche==="suivi"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:12,color:"var(--btp-blue)"}}>Besoins et etat des livraisons</h4>
              {lignes.length===0?<p style={{color:"var(--btp-text2)"}}>Aucun type de BTC renseigne dans ce chantier.</p>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead><tr style={{background:"#1A5276",color:"white"}}>
                      <th style={{padding:"8px 10px",textAlign:"left"}}>BTC</th>
                      <th style={{padding:"8px 10px",textAlign:"left"}}>Dim.</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Besoin</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Commande</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Recu</th>
                      <th style={{padding:"8px 10px",textAlign:"right",color:"#FFD700"}}>Reste</th>
                    </tr></thead>
                    <tbody>{lignes.map(function(l,i){
                      var pct=l.besoin>0?Math.min(100,Math.round(l.recu/l.besoin*100)):0;
                      return(
                        <tr key={l.prod.id} style={{background:i%2===0?"white":"#EBF5FB",borderBottom:"1px solid var(--btp-border)"}}>
                          <td style={{padding:"8px 10px",fontWeight:600}}>{l.prod.nom}</td>
                          <td style={{padding:"8px 10px",fontSize:11,color:"#999"}}>{l.prod.dim}</td>
                          <td style={{padding:"8px 10px",textAlign:"right"}}>{l.besoin.toLocaleString()}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",color:"var(--btp-blue)"}}>{l.cmdTotal.toLocaleString()}</td>
                          <td style={{padding:"8px 10px",textAlign:"right"}}>
                            <div>{l.recu.toLocaleString()}</div>
                            <div style={{background:"#EEE",borderRadius:3,height:4,marginTop:3}}>
                              <div style={{height:4,borderRadius:3,background:pct===100?"#27AE60":"#2980B9",width:pct+"%"}}></div>
                            </div>
                          </td>
                          <td style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:l.reste===0?"#27AE60":"#C0392B"}}>{l.reste.toLocaleString()}</td>
                        </tr>
                      );
                    })}</tbody>
                    <tfoot><tr style={{background:"#D6EAF8",fontWeight:700}}>
                      <td colSpan={2} style={{padding:"8px 10px"}}>TOTAL</td>
                      <td style={{padding:"8px 10px",textAlign:"right"}}>{lignes.reduce(function(a,l){return a+l.besoin;},0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",textAlign:"right",color:"var(--btp-blue)"}}>{lignes.reduce(function(a,l){return a+l.cmdTotal;},0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",textAlign:"right"}}>{lignes.reduce(function(a,l){return a+l.recu;},0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",textAlign:"right",color:"#C0392B"}}>{lignes.reduce(function(a,l){return a+l.reste;},0).toLocaleString()}</td>
                    </tr></tfoot>
                  </table>
                </div>
              )}
              <h4 style={{marginTop:20,marginBottom:10,color:"var(--btp-blue)"}}>Historique des commandes ({cmdCh.length})</h4>
              {cmdCh.length===0?<p style={{color:"var(--btp-text2)"}}>Aucune commande passee.</p>:
                cmdCh.map(function(c,i){
                  var livree=c.quantiteLivree||0; var tot=c.quantite||0; var reste=Math.max(0,tot-livree);
                  var confirme=c.quantiteConfirmeeChef||0;
                  var couleur=c.status==="Livree"?"#27AE60":c.status==="Validee"?"#2980B9":c.status==="Refusee"?"#E74C3C":"#E67E22";
                  return(
                    <div key={c.id} style={{borderRadius:10,padding:"10px 14px",marginBottom:8,background:i%2===0?"#F8FBFF":"white",border:"1px solid #EEE",borderLeft:"4px solid "+couleur}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                        <div style={{fontWeight:600,fontSize:13}}>{getProduit(c.type).nom} — {tot.toLocaleString()} u</div>
                        <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:couleur,color:"white"}}>{c.status}</span>
                      </div>
                      <div style={{fontSize:12,color:"var(--btp-text2)",marginTop:3}}>Livre: {livree.toLocaleString()} | Reste: <strong style={{color:reste===0?"#27AE60":"#C0392B"}}>{reste.toLocaleString()}</strong> | Confirme par chef: {confirme.toLocaleString()}</div>
                    </div>
                  );
                })
              }
            </div>
          )}

          {tabFiche==="commande"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:14,color:"var(--btp-blue)"}}>Nouvelle commande pour ce chantier</h4>
              {typesChantier.length===0?
                <p style={{color:"var(--btp-text2)",padding:12,background:"#FFF3CD",borderRadius:8}}>Aucun type de BTC renseigne. Modifiez la fiche chantier d'abord.</p>:
                <div style={{maxWidth:440}}>
                  <label style={{fontSize:13,fontWeight:600,color:"var(--btp-blue)",display:"block",marginBottom:4}}>Type de BTC du chantier</label>
                  <select value={cmdType} onChange={e=>setCmdType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #2980B9",background:"var(--btp-card)",fontSize:14,marginBottom:12}}>
                    <option value="">-- Choisir le type --</option>
                    {typesChantier.map(function(p){
                      var l = lignes.find(function(x){return x.prod.id===p.id;});
                      var reste = l ? l.reste : (besoins[p.id]||0);
                      return <option key={p.id} value={p.id}>{p.nom} ({p.dim}) — reste a livrer: {reste.toLocaleString()}</option>;
                    })}
                  </select>
                  <label style={{fontSize:13,fontWeight:600,color:"var(--btp-blue)",display:"block",marginBottom:4}}>Quantite a commander</label>
                  <input type="number" placeholder="Quantite" value={cmdQte} onChange={e=>setCmdQte(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid var(--btp-border)",fontSize:14,marginBottom:12}} />
                  <textarea placeholder="Notes pour la Direction (optionnel)" value={cmdNotes} onChange={e=>setCmdNotes(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid var(--btp-border)",fontSize:14,resize:"vertical",minHeight:50,marginBottom:12}} />
                  <button onClick={passerCommande} style={{width:"100%",padding:"11px",background:"#2980B9",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Envoyer la commande a la Direction ↗</button>
                </div>
              }
            </div>
          )}

          {tabFiche==="reception"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:12,color:"var(--btp-blue)"}}>Confirmer la reception des BTC sur le chantier</h4>
              {cmdCh.filter(function(c){return c.status==="Livree"||(c.quantiteLivree||0)>0;}).length===0?
                <p style={{color:"var(--btp-text2)"}}>Aucune livraison a confirmer pour l'instant.</p>:
                cmdCh.filter(function(c){return (c.quantiteLivree||0)>0;}).map(function(c){
                  var livree = c.quantiteLivree||0;
                  var confirme = c.quantiteConfirmeeChef||0;
                  var aConfirmer = Math.max(0, livree - confirme);
                  return(
                    <div key={c.id} style={{background:"var(--btp-card)",borderRadius:10,padding:14,marginBottom:10,border:"1px solid #EEE",borderLeft:"4px solid #27AE60"}}>
                      <div style={{fontWeight:700,fontSize:14}}>{getProduit(c.type).nom}</div>
                      <div style={{fontSize:12,color:"var(--btp-text2)",marginTop:4}}>Commande: {(c.quantite||0).toLocaleString()} u | Livre par stock: <strong>{livree.toLocaleString()}</strong> u | Deja confirme: {confirme.toLocaleString()} u</div>
                      {aConfirmer > 0 ? (
                        <div style={{marginTop:10,padding:"10px 14px",background:"#EAFAF1",borderRadius:8}}>
                          <div style={{fontSize:13,color:"#1E8449",fontWeight:600,marginBottom:8}}>A confirmer: {aConfirmer.toLocaleString()} u</div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                            <label style={{fontSize:12,color:"#C0392B",fontWeight:700}}>⚠️ BTC non conformes :</label>
                            <input type="number" min="0" placeholder="0" value={qteNonConformeInput[c.id]||""} onChange={e=>{var v={...qteNonConformeInput};v[c.id]=e.target.value;setQteNonConformeInput(v);}} style={{width:80,padding:"4px 8px",border:"2px solid #C0392B",borderRadius:6,fontSize:13,textAlign:"center"}} />
                            <span style={{fontSize:11,color:"var(--btp-text2)"}}>(laisser vide si aucun)</span>
                          </div>
                          {(parseInt(qteNonConformeInput[c.id])||0)>0&&<div style={{fontSize:11,color:"#C0392B",marginBottom:6,background:"#FDEBD0",padding:"4px 8px",borderRadius:6}}>⚠️ {parseInt(qteNonConformeInput[c.id])} BTC non conformes signalés pour ristourne.</div>}
                          <button onClick={()=>validerReception(c.id,aConfirmer,qteNonConformeInput[c.id]||0)} style={{padding:"8px 16px",background:"#27AE60",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>✅ Confirmer la réception</button>
                        </div>
                      ):(
                        <div style={{marginTop:8,fontSize:12,color:"var(--btp-green)",fontWeight:600}}>✅ Reception confirmee</div>
                      )}
                    </div>
                  );
                })
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FicheChantierDirection({ chantier, commandes, onClose }) {
  const [tabFiche, setTabFiche] = useState("suivi");
  var cmdCh = commandes.filter(function(c){ return c.chantierId === chantier.id; });
  var besoins = chantier.besoins || {};
  var typesChantier = CATALOGUE.filter(function(p){ return (besoins[p.id]||0) > 0; });

  // Lignes financières : uniquement sur les BTC réellement livrés et confirmés
  var lignesFinancieres = typesChantier.map(function(prod) {
    var besoin = besoins[prod.id] || 0;
    var cmdsProd = cmdCh.filter(function(c){ return c.type===prod.id; });
    var cmdTotal = cmdsProd.reduce(function(a,c){ return a+(c.quantite||0); }, 0);
    var livre = cmdsProd.reduce(function(a,c){ return a+(c.quantiteLivree||0); }, 0);
    var confirme = cmdsProd.reduce(function(a,c){ return a+(c.quantiteConfirmeeChef||0); }, 0);
    var reste = Math.max(0, besoin - livre);
    var montantLivre = livre * prod.prix;
    var montantBesoin = besoin * prod.prix;
    return { prod:prod, besoin:besoin, cmdTotal:cmdTotal, livre:livre, confirme:confirme, reste:reste, montantLivre:montantLivre, montantBesoin:montantBesoin };
  });

  var totalBesoin = lignesFinancieres.reduce(function(a,l){return a+l.besoin;},0);
  var totalCmde = lignesFinancieres.reduce(function(a,l){return a+l.cmdTotal;},0);
  var totalLivre = lignesFinancieres.reduce(function(a,l){return a+l.livre;},0);
  var totalMontantLivre = lignesFinancieres.reduce(function(a,l){return a+l.montantLivre;},0);
  var totalMontantBesoin = lignesFinancieres.reduce(function(a,l){return a+l.montantBesoin;},0);
  var totalReste = lignesFinancieres.reduce(function(a,l){return a+l.reste;},0);
  var pctGlobal = totalBesoin>0?Math.min(100,Math.round(totalLivre/totalBesoin*100)):0;

  var ts = function(t) { return { padding:"7px 14px", border:"none", cursor:"pointer", borderRadius:8, marginRight:6,
    background:tabFiche===t?"#8B1A10":"#F5E6D3", color:tabFiche===t?"white":"#2C1810", fontWeight:tabFiche===t?700:500, fontSize:13 }; };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.55)",zIndex:1000,overflowY:"auto",padding:16}}>
      <div style={{background:"var(--btp-card)",borderRadius:16,maxWidth:780,margin:"0 auto",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{background:"linear-gradient(90deg,#8B1A10,#C0392B)",color:"white",padding:"16px 20px",borderRadius:"16px 16px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h2 style={{marginBottom:4,fontSize:18}}>{chantier.nom}</h2>
              <div style={{fontSize:13,opacity:.9}}>Client: <strong>{chantier.client}</strong> | Chef: {chantier.chefNom||"-"}</div>
              {chantier.adresse&&<div style={{fontSize:12,opacity:.8,marginTop:2}}>{chantier.adresse}</div>}
            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontWeight:700}}>✕ Fermer</button>
          </div>
          <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Avancement</div>
              <div style={{fontSize:20,fontWeight:700}}>{pctGlobal}%</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Livre</div>
              <div style={{fontSize:18,fontWeight:700}}>{totalLivre.toLocaleString()} u</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Montant livre</div>
              <div style={{fontSize:18,fontWeight:700}}>{totalMontantLivre.toLocaleString("fr-FR",{minimumFractionDigits:2})} EUR</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Montant total chantier</div>
              <div style={{fontSize:18,fontWeight:700}}>{totalMontantBesoin.toLocaleString("fr-FR",{minimumFractionDigits:2})} EUR</div>
            </div>
          </div>
        </div>
        <div style={{padding:"12px 16px 0",display:"flex",flexWrap:"wrap"}}>
          <button style={ts("suivi")} onClick={()=>setTabFiche("suivi")}>Suivi livraisons</button>

        <div style={{padding:20}}>

            <div className="fade-in">

              {lignesFinancieres.length===0?<p style={{color:"var(--btp-text2)"}}>Aucun besoin enregistre.</p>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:500}}>

                      <th style={{padding:"8px 10px",textAlign:"right"}}>Besoin</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Commande</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Livre</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Confirme chef</th>
                      <th style={{padding:"8px 10px",textAlign:"right",color:"#FFD700"}}>Reste</th>
                    </tr></thead>
                    <tbody>{lignesFinancieres.map(function(l,i){
                      var pct=l.besoin>0?Math.min(100,Math.round(l.livre/l.besoin*100)):0;

}


function DashboardStock({ user, userData }) {
  const [commandes, setCommandes] = useState([]);
  const [stocks, setStocks] = useState({});
  const [qteEnvoi, setQteEnvoi] = useState({}); // par cmdId
  const [productions, setProductions] = React.useState([]);

  useEffect(() => {
    var u1 = db.collection("commandes").where("status","==","Validee").onSnapshot(snap => {
      setCommandes(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var u2 = db.collection("stocks").onSnapshot(snap => {
      var s = {}; snap.docs.forEach(d => { s[d.id] = d.data(); }); setStocks(s);
    });
    var u3 = db.collection("productions").orderBy("timestamp","desc").onSnapshot(snap => {
      setProductions(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return () => { u1(); u2(); u3(); };
  }, []);

  const enregistrerLivraison = async (cmd) => {
    var qte = parseInt(qteEnvoi[cmd.id]||0);
    if (!qte || qte <= 0) return;
    var resteMax = Math.max(0, (cmd.quantite||0) - (cmd.quantiteLivree||0));
    if (qte > resteMax) { qte = resteMax; if(qte<=0) return; }
    var dejaLivre = cmd.quantiteLivree || 0;
    var totalApres = dejaLivre + qte;
    var cmdQte = cmd.quantite || 0;
    var newStatus = totalApres >= cmdQte ? "Livree" : "Validee";

    // Soustraire du stock
    var s = stocks[cmd.type]||{};
    var newSec = Math.max(0, (s.sec||0) - qte);
    await db.collection("commandes").doc(cmd.id).update({
      quantiteLivree: totalApres,
      status: newStatus,
      livrePar: userData.nom||user.email,
      livreAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    try { await db.collection("evenements").add({ numBC: cmd.numBC||cmd.id, chantier: cmd.chantierNom||"", action: "Livraison effectuée", acteur: userData.nom||user.email, role: "resp_stock", details: "N°"+(cmd.numBC||cmd.id)+" | Qté envoyée: "+qteEnvoi+" sur "+cmd.quantite+" | Statut: "+newStatus, statut: newStatus, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
    await db.collection("stocks").doc(cmd.type).set({ sec: newSec, sechage: s.sechage||0 }, { merge:true });
    // Reset champ
    var newQte = Object.assign({}, qteEnvoi);
    delete newQte[cmd.id];
    setQteEnvoi(newQte);
  };

  return (
    <div className="btp-app">
      <div className="btp-header">
        <div className="btp-header-logo">
          <div className="btp-header-logo-icon">📦</div>
          <div>
            <div className="btp-header-title">BTC Manager</div>
            <div className="btp-header-sub">Responsable Stock</div>
          </div>
        </div>
        <div className="btp-header-right">
          <div className="btp-user-chip">👤 <strong>{userData.nom||user.email}</strong></div>
          <button className="btn btn-sm btn-danger" onClick={()=>auth.signOut()}>⏻ Déco.</button>
        </div>
      </div>
      <div className="btp-content">
        
        <h3 style={{marginBottom:14,color:"#145A32"}}>Etat du stock</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:28}}>
          {CATALOGUE.map(prod=>{
            var s=stocks[prod.id]||{}; var sec=s.sec||0; var sechage=s.sechage||0; var total=sec+sechage;
            var couleur=couleurUrgence(total);
            return(
              <div key={prod.id} style={{background:"var(--btp-card)",borderRadius:12,padding:12,boxShadow:"0 2px 6px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur}}>
                <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{prod.nom}</div>
<div style={{fontSize:11,color:"#999",marginBottom:4}}>{prod.dim}</div>
<div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
<span style={{color:"var(--btp-green)"}}>Mature: <strong>{sec.toLocaleString()}</strong></span>
<span style={{color:"#E67E22"}}>Sechage: <strong>{sechage.toLocaleString()}</strong></span>
</div>
{calcSechageActif(productions,prod.id)>0&&<div style={{fontSize:10,color:"#B7770D",background:"#FFF3CD",borderRadius:4,padding:"2px 6px",marginBottom:3}}>⏳ {calcSechageActif(productions,prod.id).toLocaleString()} u pas encore matures</div>}
<div style={{fontSize:12,fontWeight:700,color:couleur,marginTop:2}}>Total: {total.toLocaleString()}</div>
              </div>
            );
          })}
        </div>
        <h3 style={{marginBottom:10,color:"#145A32"}}>Commandes a preparer ({commandes.length})</h3>
        {commandes.length===0?<p style={{color:"var(--btp-text2)"}}>Aucune commande validee en attente.</p>:
          commandes.map(cmd=>{
            var livree = cmd.quantiteLivree || 0;
            var total = cmd.quantite || 0;
            var resteCmd = Math.max(0, total - livree);
            var pct = total>0?Math.min(100,Math.round(livree/total*100)):0;
            return(
              <div key={cmd.id} style={{background:"var(--btp-card)",borderRadius:12,padding:18,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #2980B9"}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12,alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{getProduit(cmd.type).nom}</div>
                    <div style={{fontSize:12,color:"var(--btp-text2)",marginTop:2}}>{getProduit(cmd.type).dim}</div>
                    <div style={{fontSize:13,color:"var(--btp-text)",marginTop:4}}>Chantier: <strong>{cmd.chantierNom||cmd.client||"-"}</strong></div>
                    <div style={{fontSize:12,color:"var(--btp-text2)",marginTop:2}}>Valide par: {cmd.validePar||"Direction"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,color:"var(--btp-text2)"}}>Commande totale: <strong>{total.toLocaleString()} u</strong></div>
                    <div style={{fontSize:13,color:"var(--btp-green)"}}>Deja livre: <strong>{livree.toLocaleString()} u</strong></div>
                    <div style={{fontSize:14,fontWeight:700,color:"#C0392B",marginTop:4}}>Reste a livrer: <strong>{resteCmd.toLocaleString()} u</strong>
{(function(){
var sActif=calcSechageActif(productions,cmd.type);
var sStock=stocks[cmd.type]||{};
var secMatur=sStock.sec||0;
if(resteCmd>0&&sActif>0&&resteCmd>secMatur) {
return <div style={{marginTop:6,padding:"6px 8px",background:"#FFF3CD",border:"1px solid #F39C12",borderRadius:6,fontSize:11,color:"#7D5A00",fontWeight:700,textAlign:"left"}}>
⚠️ ATTENTION: {sActif.toLocaleString()} BTC en sechage pas encore matures. Si vous livrez, des briques humides seront expedies.
</div>;
} return null;
})()}</div>
                  </div>
                </div>
                <div style={{background:"#EEE",borderRadius:4,height:8,marginBottom:8}}>
                  <div style={{height:8,borderRadius:4,background:pct===100?"#27AE60":"#2980B9",width:pct+"%"}}></div>
                </div>
                <div style={{fontSize:11,color:"var(--btp-text2)",marginBottom:12}}>{pct}% livre ({livree.toLocaleString()} / {total.toLocaleString()})</div>
                {resteCmd > 0 && (
                  <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:12,fontWeight:600,color:"#145A32",display:"block",marginBottom:4}}>Quantite effective livree maintenant :</label>
                      <input type="number" min="1" max={resteCmd} placeholder={"Max "+resteCmd.toLocaleString()}
                        value={qteEnvoi[cmd.id]||""}
                        onChange={e=>{ var v=parseInt(e.target.value)||0; var mx=Math.max(0,(cmd.quantite||0)-(cmd.quantiteLivree||0)); setQteEnvoi(Object.assign({},qteEnvoi,{[cmd.id]:v>mx?mx:(v||"")})); }}
                        style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"2px solid #1E8449",fontSize:14}} />
                    </div>
                    <button onClick={()=>enregistrerLivraison(cmd)}
                      disabled={!qteEnvoi[cmd.id]||parseInt(qteEnvoi[cmd.id])<=0}
                      style={{background:"#1E8449",color:"white",border:"none",padding:"10px 18px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,marginTop:20,opacity:(!qteEnvoi[cmd.id]||parseInt(qteEnvoi[cmd.id])<=0)?0.5:1}}>Enregistrer livraison ✓</button>
                  </div>
                )}
                {resteCmd === 0 && (
                  <div style={{padding:"8px 14px",background:"#EAFAF1",borderRadius:8,color:"#1E8449",fontWeight:700,fontSize:13,textAlign:"center"}}>✅ Commande entierement livree</div>
                )}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}

      <div style={{background:"linear-gradient(90deg,#4A235A,#6C3483)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span style={{fontSize:20}}>🏭</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Resp. Production - {userData.nom||user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:6,color:"#4A235A"}}>Priorites du jour - {dateAujourdHui}</h3>
        <p style={{fontSize:12,color:"var(--btp-text2)",marginBottom:14}}>Cible: {STOCK_CIBLE.toLocaleString()} u | Alerte si total inferieur a {STOCK_ALERTE.toLocaleString()} u</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10,marginBottom:24}}>
          {typesParUrgence.map(function(item, idx) {
            var couleur = couleurUrgence(item.total);
            var pct = Math.min(100, Math.round(item.total/STOCK_CIBLE*100));
            var manque = Math.max(0, STOCK_CIBLE-item.total);
            return (
              <div key={item.prod.id} style={{background:"var(--btp-card)",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur,position:"relative"}}>
                <div style={{position:"absolute",top:10,right:10,background:couleur,color:"white",borderRadius:16,padding:"2px 8px",fontSize:11,fontWeight:700}}>{"#"+(idx+1)}</div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:2,paddingRight:40}}>{item.prod.nom}</div>
                <div style={{fontSize:11,color:"#999",marginBottom:6}}>{item.prod.dim}</div>
                <div style={{fontSize:12,color:"var(--btp-text2)"}}>Sec: <strong>{item.sec.toLocaleString()}</strong></div>
                <div style={{fontSize:12,color:"var(--btp-text2)"}}>Sechage: <strong>{item.sechage.toLocaleString()}</strong></div>
                <div style={{margin:"6px 0 3px",background:"#EEE",borderRadius:4,height:6}}>
                  <div style={{height:6,borderRadius:4,background:couleur,width:pct+"%"}}></div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}>
                  <span style={{fontSize:12,fontWeight:700,color:couleur}}>{item.total.toLocaleString()} / {STOCK_CIBLE.toLocaleString()}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,background:couleur,color:"white"}}>{libelleUrgence(item.total)}</span>
                </div>
                {item.total<STOCK_CIBLE&&<div style={{fontSize:11,color:"var(--btp-text2)",marginTop:3}}>A produire: <strong style={{color:couleur}}>{manque.toLocaleString()}</strong></div>}
{(function(){var sa=calcSechageActif(productions,item.prod.id);if(sa>0)return<div style={{fontSize:10,color:"#B7770D",marginTop:2}}>⏳ {sa.toLocaleString()} u en sechage actif</div>;return null;})()}
              </div>
            );
          })}
        </div>
        <h3 style={{marginBottom:14,color:"#4A235A"}}>Enregistrer une production</h3>
        <div style={{background:"var(--btp-card)",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",maxWidth:440,marginBottom:24}}>
          <select value={saisieType} onChange={e=>setSaisieType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid var(--btp-border)",marginBottom:10,background:"var(--btp-card)",fontSize:14}}>
            {typesParUrgence.map(function(item) {
              return <option key={item.prod.id} value={item.prod.id}>{item.prod.nom} - {item.prod.dim}</option>;
            })}
          </select>
          <select value={saisiePhase} onChange={e=>setSaisiePhase(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid var(--btp-border)",marginBottom:10,background:"var(--btp-card)",fontSize:14}}>
            <option value="sec">Stock sec (seche)</option>
            <option value="sechage">En sechage (frais)</option>
          </select>
          <input type="number" placeholder="Quantite produite" value={saisieQte} onChange={e=>setSaisieQte(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid var(--btp-border)",marginBottom:12,fontSize:14}} />
          {msg&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msg.includes("enregistree")?"#EAFAF1":"#FFECEC",color:msg.includes("enregistree")?"#1E8449":"#C0392B"}}>{msg}</div>}
          <button onClick={enregistrer} style={{width:"100%",padding:"10px",background:"#6C3483",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Enregistrer la production</button>
        </div>
        <h3 style={{marginTop:24,marginBottom:14,color:"#C0392B"}}>📉 Enregistrer une perte</h3>
        <div style={{background:"var(--btp-card)",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",marginBottom:16}}>
          <p style={{fontSize:12,color:"var(--btp-text2)",marginBottom:12}}>Enregistrez ici les pertes de production (BTC cassés, mal formés, inutilisables). Elles seront déduites du stock.</p>
          <select value={saisiePerteType} onChange={e=>setSaisiePerteType(e.target.value)} style={{width:"100%",padding:"9px",borderRadius:8,border:"1px solid #DDD",marginBottom:8,fontSize:14}}>
            <option value="">-- Type de BTC perdu --</option>
            {typesParUrgence.map(function(item){ return <option key={item.prod.id} value={item.prod.id}>{item.prod.nom}</option>; })}
          </select>
          <input type="number" placeholder="Quantité perdue" value={saisiePerteQte} onChange={e=>setSaisiePerteQte(e.target.value)} style={{width:"100%",padding:"9px",borderRadius:8,border:"1px solid #DDD",marginBottom:8,fontSize:14,boxSizing:"border-box"}} />
          <select value={saisiePerteRaison} onChange={e=>setSaisiePerteRaison(e.target.value)} style={{width:"100%",padding:"9px",borderRadius:8,border:"1px solid #DDD",marginBottom:8,fontSize:14}}>
            <option value="production">Perte production (cassé/mal formé)</option>
            <option value="retour_nc">Retour BTC non conforme chantier</option>
          </select>
          {msgPerte&&<div style={{padding:"8px 12px",background:msgPerte.indexOf("Erreur")>-1?"#FDEBD0":"#EAFAF1",borderRadius:8,marginBottom:8,fontSize:13,color:msgPerte.indexOf("Erreur")>-1?"#C0392B":"#1E8449"}}>{msgPerte}</div>}
          <button onClick={enregistrerPerte} style={{width:"100%",padding:"10px",background:"#C0392B",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14}}>📉 Enregistrer la perte</button>
        </div>
        {pertes.length>0&&(
          <div style={{marginBottom:24}}>
            <h4 style={{marginBottom:8,color:"#C0392B"}}>Historique des pertes ({pertes.length})</h4>
            <div style={{background:"var(--btp-card)",borderRadius:10,overflow:"hidden",boxShadow:"0 2px 6px rgba(0,0,0,0.07)"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"#FDEBD0"}}><th style={{padding:"7px 10px",textAlign:"left"}}>Date</th><th style={{padding:"7px 10px",textAlign:"left"}}>Type</th><th style={{padding:"7px 10px",textAlign:"right"}}>Qté</th><th style={{padding:"7px 10px",textAlign:"left"}}>Raison</th><th style={{padding:"7px 10px",textAlign:"left"}}>Par</th></tr></thead>
                <tbody>
                {pertes.map(function(p,pi){
                  function fmtD(ts){if(!ts)return"-";try{var d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("fr-FR");}catch(e){return"-";}}
                  var raisonLabel=p.raison==="retour_nc"?"Retour NC chantier":"Perte production";
                  return(<tr key={p.id} style={{borderBottom:"1px solid #F5E6D0",background:pi%2===0?"white":"#FFFBF5"}}>
                    <td style={{padding:"6px 10px",color:"var(--btp-text2)",fontSize:11}}>{fmtD(p.timestamp)}</td>
                    <td style={{padding:"6px 10px",fontWeight:600}}>{CATALOGUE.find(function(c){return c.id===p.type;})?CATALOGUE.find(function(c){return c.id===p.type;}).nom:p.type}</td>
                    <td style={{padding:"6px 10px",textAlign:"right",color:"#C0392B",fontWeight:700}}>{p.quantite.toLocaleString()}</td>
                    <td style={{padding:"6px 10px"}}><span style={{background:p.raison==="retour_nc"?"#FDEBD0":"#FADBD8",color:p.raison==="retour_nc"?"#E67E22":"#C0392B",padding:"2px 7px",borderRadius:6,fontSize:11}}>{raisonLabel}</span></td>
                    <td style={{padding:"6px 10px",fontSize:11,color:"var(--btp-text2)"}}>{p.responsable}</td>
                  </tr>);
                })}
                </tbody>
              </table>
            </div>
          </div>
        )}
        {(function(){
var seches=productions.filter(function(p){return p.phase==="sechage";}).map(function(p){return Object.assign({},p,{jr:joursRestants(p.timestamp)});}).filter(function(p){return p.jr>0;}).sort(function(a,b){return a.jr-b.jr;});
if(seches.length>0) return(
<div style={{marginBottom:24}}>
<h3 style={{marginBottom:8,color:"#4A235A"}}>Lots en cours de sechage ({seches.length})</h3>
<p style={{fontSize:11,color:"var(--btp-text2)",marginBottom:10}}>Ces BTC ne peuvent pas etre livres avant la fin de leur sechage de {DUREE_SECHAGE} jours.</p>
{seches.map(function(p){
var pct=Math.round((DUREE_SECHAGE-p.jr)/DUREE_SECHAGE*100);
return(
<div key={p.id} style={{background:"var(--btp-card)",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",borderLeft:"3px solid #E67E22"}}>
<div style={{flex:1,minWidth:140}}>
<div style={{fontWeight:600,fontSize:13}}>{getProduit(p.type).nom}</div>
<div style={{fontSize:11,color:"#999"}}>{p.date}</div>
</div>
<div style={{textAlign:"right"}}>
<div style={{fontWeight:700,fontSize:14,color:"#E67E22"}}>{p.jr} j restants</div>
<div style={{fontSize:11,color:"var(--btp-text2)"}}>{(p.quantite||0).toLocaleString()} u</div>
</div>
<div style={{width:100}}>
<div style={{background:"#EEE",borderRadius:4,height:6}}>
<div style={{height:6,borderRadius:4,background:"#E67E22",width:pct+"%"}}></div>
</div>
<div style={{fontSize:10,color:"var(--btp-text2)",marginTop:2}}>{pct}% seche</div>
</div>
</div>
);
})}
</div>
);
return null;
})()}
<h3 style={{marginBottom:10,color:"#4A235A"}}>Productions du jour ({prodAujourdHui.length})</h3>
        {prodAujourdHui.length===0?<p style={{color:"var(--btp-text2)"}}>Aucune production enregistree aujourd'hui.</p>:
          prodAujourdHui.map(p=>{
var jrR=p.phase==="sechage"&&p.timestamp?joursRestants(p.timestamp):0;
return(
            <div key={p.id} style={{background:"var(--btp-card)",borderRadius:10,padding:"10px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+(p.phase==="sechage"?"#E67E22":"#27AE60")}}>
              <div>
                <div style={{fontWeight:600}}>{getProduit(p.type).nom} <span style={{fontSize:12,color:"var(--btp-text2)"}}>({p.phase==="sec"?"Sec":"Sechage"})</span></div>
                <div style={{fontSize:12,color:"var(--btp-text2)"}}>+{p.quantite?p.quantite.toLocaleString():"-"} u</div>
                {p.phase==="sechage"&&jrR>0&&<div style={{fontSize:11,color:"#B7770D",marginTop:2}}>⏳ Mature dans {jrR} jour{jrR>1?"s":""}</div>}
                {p.phase==="sechage"&&jrR===0&&<div style={{fontSize:11,color:"var(--btp-green)",marginTop:2}}>✅ Mature (seche)</div>}
              </div>
              {p.phase==="sechage"?(
<div style={{textAlign:"right"}}>
<span style={{background:"#FFF3CD",color:"#B7770D",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700}}>⏳ Sechage en cours</span>
<div style={{fontSize:10,color:"var(--btp-text2)",marginTop:2}}>Mature dans ~28 jours</div>
</div>
):(
<span style={{background:"#EAFAF1",color:"#1E8449",borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:700}}>✅ Sec</span>
)}
            </div>
          )
        })
        }
      </div>
    </div>

      </div>
    </div>  );
}
}




function App() {
  const [user, setUser] = useState(null);
  const [userData, setUserData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    var unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        try {
          var doc = await db.collection("users").doc(u.uid).get();
          setUserData(doc.exists ? doc.data() : { role:"inconnu" });
        } catch(e) { setUserData({ role:"inconnu" }); }
        setUser(u);
      } else {
        setUser(null); setUserData(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,var(--btp-dark),var(--btp-navy))"}}>
      <div style={{textAlign:"center",color:"white"}}>
        <div style={{width:64,height:64,background:"linear-gradient(135deg,var(--btp-orange),var(--btp-gold))",borderRadius:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 16px",boxShadow:"0 8px 24px rgba(232,96,28,.4)"}}>🧱</div>
        <div style={{fontSize:20,fontWeight:900,marginBottom:4}}>BTC Manager</div>
        <div style={{fontSize:12,color:"var(--btp-text2)",letterSpacing:2,textTransform:"uppercase",marginBottom:20}}>Terre et Eau · Mamoudzou</div>
        <div style={{width:40,height:40,border:"3px solid rgba(255,255,255,.2)",borderTopColor:"var(--btp-orange)",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto"}}></div>
      </div>
    </div>
  );

    if (!user) return <Login />;
  if (!userData) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"var(--btp-text2)"}}><div style={{fontSize:40}}>⏳</div><p>Chargement...</p></div>
    </div>
  );

  var role = userData.role ? userData.role.trim().toLowerCase() : "";
  if (role==="direction") return <DashboardDirection user={user} userData={userData} />;
  if (role==="chef_chantier") return <DashboardChef user={user} userData={userData} />;
  if (role==="resp_stock") return <DashboardStock user={user} userData={userData} />;
  if (role==="resp_production") return <DashboardProduction user={user} userData={userData} />;
  if (role==="comptable") return <DashboardComptable user={user} userData={userData} />;

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,var(--btp-dark),var(--btp-navy))"}}>
      <div style={{textAlign:"center",padding:40,background:"var(--btp-card)",borderRadius:16,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <h3 style={{color:"#C0392B",marginBottom:8}}>Role non reconnu</h3>
        <p style={{color:"var(--btp-text2)",marginBottom:4}}>Role detecte: "{role}"</p>
        <p style={{color:"var(--btp-text2)",fontSize:13}}>Contactez l'administrateur.</p>
        <button onClick={()=>auth.signOut()} style={{marginTop:16,padding:"8px 20px",background:"#C0392B",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Deconnexion</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
  </html>
