const TYPES_BTC = CATALOGUE.map(function(p) { return p.id; });
const STOCK_CIBLE = 10000;
const STOCK_ALERTE = 7500;
const DUREE_SECHAGE = 28;
const MS_PAR_JOUR = 86400000;

function couleurUrgence(total) {
  if (total < STOCK_ALERTE) return "#C0392B";
  if (total < STOCK_CIBLE) return "#E67E22";
  return "#27AE60";
}
function libelleUrgence(total) {
  if (total < STOCK_ALERTE) return "ALERTE";
  if (total < STOCK_CIBLE) return "A PRODUIRE";
  return "OK";
}
function joursRestants(dateTs) {
if (!dateTs) return 0;
var d = dateTs.toDate ? dateTs.toDate() : new Date(dateTs);
return Math.max(0, DUREE_SECHAGE - Math.floor((Date.now()-d.getTime())/MS_PAR_JOUR));
}
function calcSechageActif(prods, typeId) {
var now28 = Date.now() - DUREE_SECHAGE*MS_PAR_JOUR;
var actif = 0;
prods.forEach(function(p) {
if (p.type!==typeId||p.phase!=='sechage') return;
var d = p.timestamp&&p.timestamp.toDate ? p.timestamp.toDate().getTime() : 0;
if (d && d>now28) actif += (p.quantite||0);
});
return actif;
}
function getProduit(id) {
  return CATALOGUE.find(function(p) { return p.id === id; }) || { nom: id, dim: "", prix: 0 };
}

    var besoin = besoins[prod.id] || 0;

    var recu = cmdCh.filter(function(c){ return c.type===prod.id; }).reduce(function(a,c){ return a+(c.quantiteLivree||0); }, 0);
    var reste = Math.max(0, besoin - recu);
    return { prod:prod, besoin:besoin, cmdTotal:cmdTotal, recu:recu, reste:reste };
  });

  var passerCommande = async function() {
    if (!cmdType||!cmdQte) { setMsgCmd("Choisissez un type et entrez la quantite"); return; }
    try {
      // Générer numéro BC unique
      var now = new Date();
      var yyyy = now.getFullYear();
      var mm = String(now.getMonth()+1).padStart(2,"0");
      var rand = Math.floor(1000+Math.random()*9000);
      var numBC = "BC-"+yyyy+mm+"-"+rand;
      var catItem = CATALOGUE.find(function(p){return p.id===cmdType;})||{};
      await db.collection("commandes").add({
        numBC: numBC,
        type: cmdType, typNom: catItem.nom||cmdType, quantite: parseInt(cmdQte), notes: cmdNotes,
        chantierId: chantier.id, chantierNom: chantier.nom, client: chantier.client,
        chefUid: user.uid, chefEmail: user.email, chefNom: userData.nom||user.email,
        status: "EnAttente", quantiteLivree: 0,
        prixUnit: catItem.prix||0,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      try { await db.collection("evenements").add({ numBC: numBC, chantier: cmdChantierNom||"", action: "Commande créée", acteur: userData.nom||user.email, role: "direction", details: "N°"+numBC+" | BTC: "+cmdType+" | Qté: "+cmdQte, statut: "En attente validation Direction", timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
      setMsgCmd("Commande envoyée ! Bon de commande "+numBC+" créé. En attente de validation Direction.");
      setCmdQte(""); setCmdNotes(""); setCmdType("");
      setTabFiche("suivi");
    } catch(e) { setMsgCmd("Erreur: "+e.message); }
  };

  var validerReception = async function(cmdId, qteRecue, nonConforme) {
    var cmd = cmdCh.find(function(c){return c.id===cmdId;});
    if (!cmd) return;
    var cmdQteTotal = (cmd.quantite||0);
    var deja = (cmd.quantiteConfirmeeChef||0);
    var nouveauTotal = Math.min(deja + qteRecue, cmdQteTotal);
    var newStatus = (nouveauTotal >= cmdQteTotal) ? "Livree" : cmd.status;
    var nc = parseInt(nonConforme)||0;
    var prix = 0;
    var catItem = CATALOGUE.find(function(p){return p.id===cmd.type;});
    if(catItem) prix = catItem.prix||0;
    var updateObj = { quantiteConfirmeeChef:nouveauTotal, chefConfirmeAt:firebase.firestore.FieldValue.serverTimestamp(), status:newStatus };
    if(nc>0){ updateObj.qteNonConforme=(cmd.qteNonConforme||0)+nc; updateObj.montantNonConforme=((cmd.qteNonConforme||0)+nc)*prix; }
    await db.collection("commandes").doc(cmdId).update(updateObj);
    if(nc>0){
      try{
        await db.collection("pertes").add({
          type:cmd.type, quantite:nc, raison:"retour_nc",
          responsable:userData.nom||user.email, responsableUid:user.uid,
          source:"chantier", chantierNom:chantier.nom, cmdId:cmdId,
          timestamp:firebase.firestore.FieldValue.serverTimestamp()
        });
      try { await db.collection("evenements").add({ numBC: cmd.numBC||cmdId, chantier: chantier.nom||"", action: "Réception confirmée par chef", acteur: userData.nom||user.email, role: "chef_chantier", details: "N°"+(cmd.numBC||cmdId)+" | Qté reçue: "+(cmd.quantiteLivree||0)+" BTC | NC: "+nc, statut: "Réception confirmée", timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
      }catch(ep){}
    }
    var v={...qteNonConformeInput}; delete v[cmdId]; setQteNonConformeInput(v);
    setMsgCmd("Reception confirmee !");
  };

  var ts = function(t) { return { padding:"7px 14px", border:"none", cursor:"pointer", borderRadius:8, marginRight:6,
    background:tabFiche===t?"#2980B9":"#D6EAF8", color:tabFiche===t?"white":"#1A5276", fontWeight:tabFiche===t?700:500, fontSize:13 }; };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.55)",zIndex:1000,overflowY:"auto",padding:16}}>
      <div style={{background:"white",borderRadius:16,maxWidth:720,margin:"0 auto",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{background:"linear-gradient(90deg,#1A5276,#2980B9)",color:"white",padding:"16px 20px",borderRadius:"16px 16px 0 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h2 style={{marginBottom:4,fontSize:18}}>{chantier.nom}</h2>
            <div style={{fontSize:13,opacity:.9}}>Client: {chantier.client}</div>
            {chantier.adresse&&<div style={{fontSize:12,opacity:.8}}>{chantier.adresse}</div>}
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:14}}>✕ Fermer</button>
        </div>
        <div style={{padding:"12px 16px 0",display:"flex",flexWrap:"wrap"}}>
          <button style={ts("suivi")} onClick={()=>setTabFiche("suivi")}>📊 Suivi</button>
          <button style={ts("commande")} onClick={()=>setTabFiche("commande")}>+ Passer une commande</button>
          {(function(){var hasLiv=cmdCh.some(function(c){return (c.quantiteLivree||0)>0;});return(<button style={ts("reception")} onClick={()=>{if(hasLiv)setTabFiche("reception");}} disabled={!hasLiv} title={hasLiv?"":"En attente de livraison par le stock"} >{hasLiv?"✅ Valider réception":"🔒 Valider réception (en attente livraison)"}</button>);})()}
        </div>

        <div style={{padding:20}}>
          {msgCmd&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:12,fontSize:13,background:msgCmd.includes("envoyee")||msgCmd.includes("confirme")?"#EAFAF1":"#FFECEC",color:msgCmd.includes("envoyee")||msgCmd.includes("confirme")?"#1E8449":"#C0392B"}}>{msgCmd}</div>}

          {tabFiche==="suivi"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:12,color:"#1A5276"}}>Besoins et etat des livraisons</h4>
              {lignes.length===0?<p style={{color:"#888"}}>Aucun type de BTC renseigne dans ce chantier.</p>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead><tr style={{background:"#1A5276",color:"white"}}>
                      <th style={{padding:"8px 10px",textAlign:"left"}}>BTC</th>
                      <th style={{padding:"8px 10px",textAlign:"left"}}>Dim.</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Besoin</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Commande</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Recu</th>
                      <th style={{padding:"8px 10px",textAlign:"right",color:"#FFD700"}}>Reste</th>
                    </tr></thead>
                    <tbody>{lignes.map(function(l,i){
                      var pct=l.besoin>0?Math.min(100,Math.round(l.recu/l.besoin*100)):0;
                      return(
                        <tr key={l.prod.id} style={{background:i%2===0?"white":"#EBF5FB",borderBottom:"1px solid #ddd"}}>
                          <td style={{padding:"8px 10px",fontWeight:600}}>{l.prod.nom}</td>
                          <td style={{padding:"8px 10px",fontSize:11,color:"#999"}}>{l.prod.dim}</td>
                          <td style={{padding:"8px 10px",textAlign:"right"}}>{l.besoin.toLocaleString()}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",color:"#2980B9"}}>{l.cmdTotal.toLocaleString()}</td>
                          <td style={{padding:"8px 10px",textAlign:"right"}}>
                            <div>{l.recu.toLocaleString()}</div>
                            <div style={{background:"#EEE",borderRadius:3,height:4,marginTop:3}}>
                              <div style={{height:4,borderRadius:3,background:pct===100?"#27AE60":"#2980B9",width:pct+"%"}}></div>
                            </div>
                          </td>
                          <td style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:l.reste===0?"#27AE60":"#C0392B"}}>{l.reste.toLocaleString()}</td>
                        </tr>
                      );
                    })}</tbody>
                    <tfoot><tr style={{background:"#D6EAF8",fontWeight:700}}>
                      <td colSpan={2} style={{padding:"8px 10px"}}>TOTAL</td>
                      <td style={{padding:"8px 10px",textAlign:"right"}}>{lignes.reduce(function(a,l){return a+l.besoin;},0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",textAlign:"right",color:"#2980B9"}}>{lignes.reduce(function(a,l){return a+l.cmdTotal;},0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",textAlign:"right"}}>{lignes.reduce(function(a,l){return a+l.recu;},0).toLocaleString()}</td>
                      <td style={{padding:"8px 10px",textAlign:"right",color:"#C0392B"}}>{lignes.reduce(function(a,l){return a+l.reste;},0).toLocaleString()}</td>
                    </tr></tfoot>
                  </table>
                </div>
              )}
              <h4 style={{marginTop:20,marginBottom:10,color:"#1A5276"}}>Historique des commandes ({cmdCh.length})</h4>
              {cmdCh.length===0?<p style={{color:"#888"}}>Aucune commande passee.</p>:
                cmdCh.map(function(c,i){
                  var livree=c.quantiteLivree||0; var tot=c.quantite||0; var reste=Math.max(0,tot-livree);
                  var confirme=c.quantiteConfirmeeChef||0;
                  var couleur=c.status==="Livree"?"#27AE60":c.status==="Validee"?"#2980B9":c.status==="Refusee"?"#E74C3C":"#E67E22";
                  return(
                    <div key={c.id} style={{borderRadius:10,padding:"10px 14px",marginBottom:8,background:i%2===0?"#F8FBFF":"white",border:"1px solid #EEE",borderLeft:"4px solid "+couleur}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                        <div style={{fontWeight:600,fontSize:13}}>{getProduit(c.type).nom} — {tot.toLocaleString()} u</div>
                        <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:couleur,color:"white"}}>{c.status}</span>
                      </div>
                      <div style={{fontSize:12,color:"#666",marginTop:3}}>Livre: {livree.toLocaleString()} | Reste: <strong style={{color:reste===0?"#27AE60":"#C0392B"}}>{reste.toLocaleString()}</strong> | Confirme par chef: {confirme.toLocaleString()}</div>
                    </div>
                  );
                })
              }
            </div>
          )}

          {tabFiche==="commande"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:14,color:"#1A5276"}}>Nouvelle commande pour ce chantier</h4>
              {typesChantier.length===0?
                <p style={{color:"#888",padding:12,background:"#FFF3CD",borderRadius:8}}>Aucun type de BTC renseigne. Modifiez la fiche chantier d'abord.</p>:
                <div style={{maxWidth:440}}>
                  <label style={{fontSize:13,fontWeight:600,color:"#1A5276",display:"block",marginBottom:4}}>Type de BTC du chantier</label>
                  <select value={cmdType} onChange={e=>setCmdType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #2980B9",background:"white",fontSize:14,marginBottom:12}}>
                    <option value="">-- Choisir le type --</option>
                    {typesChantier.map(function(p){
                      var l = lignes.find(function(x){return x.prod.id===p.id;});
                      var reste = l ? l.reste : (besoins[p.id]||0);
                      return <option key={p.id} value={p.id}>{p.nom} ({p.dim}) — reste a livrer: {reste.toLocaleString()}</option>;
                    })}
                  </select>
                  <label style={{fontSize:13,fontWeight:600,color:"#1A5276",display:"block",marginBottom:4}}>Quantite a commander</label>
                  <input type="number" placeholder="Quantite" value={cmdQte} onChange={e=>setCmdQte(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",fontSize:14,marginBottom:12}} />
                  <textarea placeholder="Notes pour la Direction (optionnel)" value={cmdNotes} onChange={e=>setCmdNotes(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",fontSize:14,resize:"vertical",minHeight:50,marginBottom:12}} />
                  <button onClick={passerCommande} style={{width:"100%",padding:"11px",background:"#2980B9",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Envoyer la commande a la Direction ↗</button>
                </div>
              }
            </div>
          )}

          {tabFiche==="reception"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:12,color:"#1A5276"}}>Confirmer la reception des BTC sur le chantier</h4>
              {cmdCh.filter(function(c){return c.status==="Livree"||(c.quantiteLivree||0)>0;}).length===0?
                <p style={{color:"#888"}}>Aucune livraison a confirmer pour l'instant.</p>:
                cmdCh.filter(function(c){return (c.quantiteLivree||0)>0;}).map(function(c){
                  var livree = c.quantiteLivree||0;
                  var confirme = c.quantiteConfirmeeChef||0;
                  var aConfirmer = Math.max(0, livree - confirme);
                  return(
                    <div key={c.id} style={{background:"white",borderRadius:10,padding:14,marginBottom:10,border:"1px solid #EEE",borderLeft:"4px solid #27AE60"}}>
                      <div style={{fontWeight:700,fontSize:14}}>{getProduit(c.type).nom}</div>
                      <div style={{fontSize:12,color:"#666",marginTop:4}}>Commande: {(c.quantite||0).toLocaleString()} u | Livre par stock: <strong>{livree.toLocaleString()}</strong> u | Deja confirme: {confirme.toLocaleString()} u</div>
                      {aConfirmer > 0 ? (
                        <div style={{marginTop:10,padding:"10px 14px",background:"#EAFAF1",borderRadius:8}}>
                          <div style={{fontSize:13,color:"#1E8449",fontWeight:600,marginBottom:8}}>A confirmer: {aConfirmer.toLocaleString()} u</div>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                            <label style={{fontSize:12,color:"#C0392B",fontWeight:700}}>⚠️ BTC non conformes :</label>
                            <input type="number" min="0" placeholder="0" value={qteNonConformeInput[c.id]||""} onChange={e=>{var v={...qteNonConformeInput};v[c.id]=e.target.value;setQteNonConformeInput(v);}} style={{width:80,padding:"4px 8px",border:"2px solid #C0392B",borderRadius:6,fontSize:13,textAlign:"center"}} />
                            <span style={{fontSize:11,color:"#888"}}>(laisser vide si aucun)</span>
                          </div>
                          {(parseInt(qteNonConformeInput[c.id])||0)>0&&<div style={{fontSize:11,color:"#C0392B",marginBottom:6,background:"#FDEBD0",padding:"4px 8px",borderRadius:6}}>⚠️ {parseInt(qteNonConformeInput[c.id])} BTC non conformes signalés pour ristourne.</div>}
                          <button onClick={()=>validerReception(c.id,aConfirmer,qteNonConformeInput[c.id]||0)} style={{padding:"8px 16px",background:"#27AE60",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>✅ Confirmer la réception</button>
                        </div>
                      ):(
                        <div style={{marginTop:8,fontSize:12,color:"#27AE60",fontWeight:600}}>✅ Reception confirmee</div>
                      )}
                    </div>
                  );
                })
              }
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function FicheChantierDirection({ chantier, commandes, onClose }) {
  const [tabFiche, setTabFiche] = useState("suivi");
  var cmdCh = commandes.filter(function(c){ return c.chantierId === chantier.id; });
  var besoins = chantier.besoins || {};
  var typesChantier = CATALOGUE.filter(function(p){ return (besoins[p.id]||0) > 0; });

  // Lignes financières : uniquement sur les BTC réellement livrés et confirmés
  var lignesFinancieres = typesChantier.map(function(prod) {
    var besoin = besoins[prod.id] || 0;
    var cmdsProd = cmdCh.filter(function(c){ return c.type===prod.id; });
    var cmdTotal = cmdsProd.reduce(function(a,c){ return a+(c.quantite||0); }, 0);
    var livre = cmdsProd.reduce(function(a,c){ return a+(c.quantiteLivree||0); }, 0);
    var confirme = cmdsProd.reduce(function(a,c){ return a+(c.quantiteConfirmeeChef||0); }, 0);
    var reste = Math.max(0, besoin - livre);
    var montantLivre = livre * prod.prix;
    var montantBesoin = besoin * prod.prix;
    return { prod:prod, besoin:besoin, cmdTotal:cmdTotal, livre:livre, confirme:confirme, reste:reste, montantLivre:montantLivre, montantBesoin:montantBesoin };
  });

  var totalBesoin = lignesFinancieres.reduce(function(a,l){return a+l.besoin;},0);
  var totalCmde = lignesFinancieres.reduce(function(a,l){return a+l.cmdTotal;},0);
  var totalLivre = lignesFinancieres.reduce(function(a,l){return a+l.livre;},0);
  var totalMontantLivre = lignesFinancieres.reduce(function(a,l){return a+l.montantLivre;},0);
  var totalMontantBesoin = lignesFinancieres.reduce(function(a,l){return a+l.montantBesoin;},0);
  var totalReste = lignesFinancieres.reduce(function(a,l){return a+l.reste;},0);
  var pctGlobal = totalBesoin>0?Math.min(100,Math.round(totalLivre/totalBesoin*100)):0;

  var ts = function(t) { return { padding:"7px 14px", border:"none", cursor:"pointer", borderRadius:8, marginRight:6,
    background:tabFiche===t?"#8B1A10":"#F5E6D3", color:tabFiche===t?"white":"#2C1810", fontWeight:tabFiche===t?700:500, fontSize:13 }; };

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.55)",zIndex:1000,overflowY:"auto",padding:16}}>
      <div style={{background:"white",borderRadius:16,maxWidth:780,margin:"0 auto",boxShadow:"0 8px 40px rgba(0,0,0,0.3)"}}>
        <div style={{background:"linear-gradient(90deg,#8B1A10,#C0392B)",color:"white",padding:"16px 20px",borderRadius:"16px 16px 0 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h2 style={{marginBottom:4,fontSize:18}}>{chantier.nom}</h2>
              <div style={{fontSize:13,opacity:.9}}>Client: <strong>{chantier.client}</strong> | Chef: {chantier.chefNom||"-"}</div>
              {chantier.adresse&&<div style={{fontSize:12,opacity:.8,marginTop:2}}>{chantier.adresse}</div>}
            </div>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontWeight:700}}>✕ Fermer</button>
          </div>
          <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Avancement</div>
              <div style={{fontSize:20,fontWeight:700}}>{pctGlobal}%</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Livre</div>
              <div style={{fontSize:18,fontWeight:700}}>{totalLivre.toLocaleString()} u</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Montant livre</div>
              <div style={{fontSize:18,fontWeight:700}}>{totalMontantLivre.toLocaleString("fr-FR",{minimumFractionDigits:2})} EUR</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,padding:"8px 16px",textAlign:"center"}}>
              <div style={{fontSize:11,opacity:.8}}>Montant total chantier</div>
              <div style={{fontSize:18,fontWeight:700}}>{totalMontantBesoin.toLocaleString("fr-FR",{minimumFractionDigits:2})} EUR</div>
            </div>

        <div style={{padding:"12px 16px 0",display:"flex",flexWrap:"wrap"}}>

          <button style={ts("commandes")} onClick={()=>setTabFiche("commandes")}>Historique commandes</button>
        </div>

        <div style={{padding:20}}>
          {tabFiche==="suivi"&&(
            <div className="fade-in">
              <h4 style={{marginBottom:12,color:"#8B1A10"}}>Etat des livraisons par type</h4>
              {lignesFinancieres.length===0?<p style={{color:"#888"}}>Aucun besoin enregistre.</p>:(
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:500}}>
                    <thead><tr style={{background:"#8B1A10",color:"white"}}>
                      <th style={{padding:"8px 10px",textAlign:"left"}}>BTC</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Besoin</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Commande</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Livre</th>
                      <th style={{padding:"8px 10px",textAlign:"right"}}>Confirme chef</th>
                      <th style={{padding:"8px 10px",textAlign:"right",color:"#FFD700"}}>Reste</th>
                    </tr></thead>
                    <tbody>{lignesFinancieres.map(function(l,i){
                      var pct=l.besoin>0?Math.min(100,Math.round(l.livre/l.besoin*100)):0;
                      return(
                        <tr key={l.prod.id} style={{background:i%2===0?"white":"#FEF9F0",borderBottom:"1px solid #EEE"}}>
                          <td style={{padding:"8px 10px"}}><div style={{fontWeight:600}}>{l.prod.nom}</div><div style={{fontSize:11,color:"#999"}}>{l.prod.dim}</div></td>
                          <td style={{padding:"8px 10px",textAlign:"right"}}>{l.besoin.toLocaleString()}</td>
                          <td style={{padding:"8px 10px",textAlign:"right",color:"#2980B9"}}>{l.cmdTotal.toLocaleString()}</td>
                          <td style={{padding:"8px 10px",textAlign:"right"}}>
                            <div>{l.livre.toLocaleString()}</div>
                            <div style={{background:"#EEE",borderRadius:3,height:4,marginTop:3,minWidth:50}}>
                              <div style={{height:4,borderRadius:3,background:pct===100?"#27AE60":"#C0392B",width:pct+"%"}}></div>

                          var dejaRecu = commandes.filter(function(c){return c.chantierId===cmdChantierId&&c.type===p.id;}).reduce(function(a,c){return a+(c.quantiteLivree||0);},0);
                          var reste = Math.max(0, besoin - dejaRecu);
                          return <option key={p.id} value={p.id}>{p.nom} ({p.dim}) | besoin: {besoin.toLocaleString()} | reste: {reste.toLocaleString()}</option>;
                        })}
                      </select>
                    </div>
                    <div style={{marginBottom:12}}>
                      <label style={{fontSize:13,fontWeight:600,color:"#1A5276",display:"block",marginBottom:4}}>Quantite a commander</label>
                      <input type="number" placeholder="Quantite" value={cmdQte} onChange={e=>setCmdQte(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",fontSize:14}} />
                    </div>
                    <textarea placeholder="Notes (optionnel)" value={cmdNotes} onChange={e=>setCmdNotes(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14,resize:"vertical",minHeight:50}} />
                    {msgCmd&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msgCmd.includes("envoyee")?"#EBF5FB":"#FFECEC",color:msgCmd.includes("envoyee")?"#1A5276":"#C0392B"}}>{msgCmd}</div>}
                    <button onClick={passerCommande} style={{width:"100%",padding:"10px",background:"#2980B9",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Envoyer la commande</button>
                  </div>
                )}
              </div>
            }
          </div>
        )}
      </div>
    </div>
  );
}


function DashboardStock({ user, userData }) {
  const [commandes, setCommandes] = useState([]);
  const [stocks, setStocks] = useState({});
  const [qteEnvoi, setQteEnvoi] = useState({}); // par cmdId
  const [productions, setProductions] = React.useState([]);

  useEffect(() => {
    var u1 = db.collection("commandes").where("status","==","Validee").onSnapshot(snap => {
      setCommandes(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var u2 = db.collection("stocks").onSnapshot(snap => {
      var s = {}; snap.docs.forEach(d => { s[d.id] = d.data(); }); setStocks(s);
    });
    var u3 = db.collection("productions").orderBy("timestamp","desc").onSnapshot(snap => {
      setProductions(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return () => { u1(); u2(); u3(); };
  }, []);

  const enregistrerLivraison = async (cmd) => {
    var qte = parseInt(qteEnvoi[cmd.id]||0);
    if (!qte || qte <= 0) return;
    var resteMax = Math.max(0, (cmd.quantite||0) - (cmd.quantiteLivree||0));
    if (qte > resteMax) { qte = resteMax; if(qte<=0) return; }
    var dejaLivre = cmd.quantiteLivree || 0;
    var totalApres = dejaLivre + qte;
    var cmdQte = cmd.quantite || 0;
    var newStatus = totalApres >= cmdQte ? "Livree" : "Validee";

    // Soustraire du stock
    var s = stocks[cmd.type]||{};
    var newSec = Math.max(0, (s.sec||0) - qte);
    await db.collection("commandes").doc(cmd.id).update({
      quantiteLivree: totalApres,
      status: newStatus,
      livrePar: userData.nom||user.email,
      livreAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    try { await db.collection("evenements").add({ numBC: cmd.numBC||cmd.id, chantier: cmd.chantierNom||"", action: "Livraison effectuée", acteur: userData.nom||user.email, role: "resp_stock", details: "N°"+(cmd.numBC||cmd.id)+" | Qté envoyée: "+qteEnvoi+" sur "+cmd.quantite+" | Statut: "+newStatus, statut: newStatus, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); } catch(e) {}
    await db.collection("stocks").doc(cmd.type).set({ sec: newSec, sechage: s.sechage||0 }, { merge:true });
    // Reset champ
    var newQte = Object.assign({}, qteEnvoi);
    delete newQte[cmd.id];
    setQteEnvoi(newQte);
  };

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#145A32,#1E8449)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span style={{fontSize:20}}>📦</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Resp. Stock - {userData.nom||user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:14,color:"#145A32"}}>Etat du stock</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:28}}>
          {CATALOGUE.map(prod=>{
            var s=stocks[prod.id]||{}; var sec=s.sec||0; var sechage=s.sechage||0; var total=sec+sechage;
            var couleur=couleurUrgence(total);
            return(
              <div key={prod.id} style={{background:"white",borderRadius:12,padding:12,boxShadow:"0 2px 6px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur}}>
                <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{prod.nom}</div>
<div style={{fontSize:11,color:"#999",marginBottom:4}}>{prod.dim}</div>
<div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
<span style={{color:"#27AE60"}}>Mature: <strong>{sec.toLocaleString()}</strong></span>
<span style={{color:"#E67E22"}}>Sechage: <strong>{sechage.toLocaleString()}</strong></span>
</div>
{calcSechageActif(productions,prod.id)>0&&<div style={{fontSize:10,color:"#B7770D",background:"#FFF3CD",borderRadius:4,padding:"2px 6px",marginBottom:3}}>⏳ {calcSechageActif(productions,prod.id).toLocaleString()} u pas encore matures</div>}
<div style={{fontSize:12,fontWeight:700,color:couleur,marginTop:2}}>Total: {total.toLocaleString()}</div>
              </div>
            );
          })}
        </div>
        <h3 style={{marginBottom:10,color:"#145A32"}}>Commandes a preparer ({commandes.length})</h3>
        {commandes.length===0?<p style={{color:"#888"}}>Aucune commande validee en attente.</p>:
          commandes.map(cmd=>{
            var livree = cmd.quantiteLivree || 0;
            var total = cmd.quantite || 0;
            var resteCmd = Math.max(0, total - livree);
            var pct = total>0?Math.min(100,Math.round(livree/total*100)):0;
            return(
              <div key={cmd.id} style={{background:"white",borderRadius:12,padding:18,marginBottom:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #2980B9"}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12,alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:15}}>{getProduit(cmd.type).nom}</div>
                    <div style={{fontSize:12,color:"#888",marginTop:2}}>{getProduit(cmd.type).dim}</div>
                    <div style={{fontSize:13,color:"#444",marginTop:4}}>Chantier: <strong>{cmd.chantierNom||cmd.client||"-"}</strong></div>
                    <div style={{fontSize:12,color:"#666",marginTop:2}}>Valide par: {cmd.validePar||"Direction"}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:13,color:"#666"}}>Commande totale: <strong>{total.toLocaleString()} u</strong></div>
                    <div style={{fontSize:13,color:"#27AE60"}}>Deja livre: <strong>{livree.toLocaleString()} u</strong></div>
                    <div style={{fontSize:14,fontWeight:700,color:"#C0392B",marginTop:4}}>Reste a livrer: <strong>{resteCmd.toLocaleString()} u</strong>
{(function(){
var sActif=calcSechageActif(productions,cmd.type);
var sStock=stocks[cmd.type]||{};
var secMatur=sStock.sec||0;
if(resteCmd>0&&sActif>0&&resteCmd>secMatur) {
return <div style={{marginTop:6,padding:"6px 8px",background:"#FFF3CD",border:"1px solid #F39C12",borderRadius:6,fontSize:11,color:"#7D5A00",fontWeight:700,textAlign:"left"}}>
⚠️ ATTENTION: {sActif.toLocaleString()} BTC en sechage pas encore matures. Si vous livrez, des briques humides seront expedies.
</div>;
} return null;
})()}</div>
                  </div>
                </div>
                <div style={{background:"#EEE",borderRadius:4,height:8,marginBottom:8}}>
                  <div style={{height:8,borderRadius:4,background:pct===100?"#27AE60":"#2980B9",width:pct+"%"}}></div>
                </div>
                <div style={{fontSize:11,color:"#888",marginBottom:12}}>{pct}% livre ({livree.toLocaleString()} / {total.toLocaleString()})</div>
                {resteCmd > 0 && (
                  <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:12,fontWeight:600,color:"#145A32",display:"block",marginBottom:4}}>Quantite effective livree maintenant :</label>
                      <input type="number" min="1" max={resteCmd} placeholder={"Max "+resteCmd.toLocaleString()}
                        value={qteEnvoi[cmd.id]||""}
                        onChange={e=>{ var v=parseInt(e.target.value)||0; var mx=Math.max(0,(cmd.quantite||0)-(cmd.quantiteLivree||0)); setQteEnvoi(Object.assign({},qteEnvoi,{[cmd.id]:v>mx?mx:(v||"")})); }}
                        style={{width:"100%",padding:"8px 12px",borderRadius:8,border:"2px solid #1E8449",fontSize:14}} />
                    </div>
                    <button onClick={()=>enregistrerLivraison(cmd)}
                      disabled={!qteEnvoi[cmd.id]||parseInt(qteEnvoi[cmd.id])<=0}
                      style={{background:"#1E8449",color:"white",border:"none",padding:"10px 18px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13,marginTop:20,opacity:(!qteEnvoi[cmd.id]||parseInt(qteEnvoi[cmd.id])<=0)?0.5:1}}>Enregistrer livraison ✓</button>
                  </div>
                )}
                {resteCmd === 0 && (
                  <div style={{padding:"8px 14px",background:"#EAFAF1",borderRadius:8,color:"#1E8449",fontWeight:700,fontSize:13,textAlign:"center"}}>✅ Commande entierement livree</div>
                )}
              </div>
            );
          })
        }
      </div>
    </div>
  );
}


function DashboardProduction({ user, userData }) {

  const [tabProd, setTabProd] = React.useState("production");

  useEffect(() => {
    var u1 = db.collection("stocks").onSnapshot(snap => {
      var s = {}; snap.docs.forEach(d => { s[d.id] = d.data(); }); setStocks(s);
    });
    var u2 = db.collection("productions").onSnapshot(snap => {
      setProductions(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var u3 = db.collection("pertes").orderBy("timestamp","desc").onSnapshot(snap => {
      setPertes(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    var u4 = db.collection("commandes").onSnapshot(snap => {

  var prodAujourdHui = productions.filter(function(p) { return p.date === dateAujourdHui; });

        type:saisieType, quantite:qte, phase:saisiePhase,

        responsableUid:user.uid, statut:"Valide",

      await db.collection("stocks").doc(saisieType).set(upd, { merge:true });
      setMsg("Production enregistree ! Stock mis a jour.");
      setSaisieQte("");

  var enregistrerPerte = async function() {

    try {
      var qte = parseInt(saisiePerteQte);

      // Déduire du stock

                <tbody>
                {pertes.map(function(p,pi){
                  function fmtD(ts){if(!ts)return"-";try{var d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString("fr-FR");}catch(e){return"-";}}
                  var raisonLabel=p.raison==="retour_nc"?"Retour NC chantier":"Perte production";
                  return(<tr key={p.id} style={{borderBottom:"1px solid #F5E6D0",background:pi%2===0?"white":"#FFFBF5"}}>
                    <td style={{padding:"6px 10px",color:"#666",fontSize:11}}>{fmtD(p.timestamp)}</td>
                    <td style={{padding:"6px 10px",fontWeight:600}}>{CATALOGUE.find(function(c){return c.id===p.type;})?CATALOGUE.find(function(c){return c.id===p.type;}).nom:p.type}</td>
                    <td style={{padding:"6px 10px",textAlign:"right",color:"#C0392B",fontWeight:700}}>{p.quantite.toLocaleString()}</td>
                    <td style={{padding:"6px 10px"}}><span style={{background:p.raison==="retour_nc"?"#FDEBD0":"#FADBD8",color:p.raison==="retour_nc"?"#E67E22":"#C0392B",padding:"2px 7px",borderRadius:6,fontSize:11}}>{raisonLabel}</span></td>
                    <td style={{padding:"6px 10px",fontSize:11,color:"#888"}}>{p.responsable}</td>
                  </tr>);
                })}
                </tbody>
              </table>
            </div>
          </div>
        )}
        {(function(){
var seches=productions.filter(function(p){return p.phase==="sechage";}).map(function(p){return Object.assign({},p,{jr:joursRestants(p.timestamp)});}).filter(function(p){return p.jr>0;}).sort(function(a,b){return a.jr-b.jr;});
if(seches.length>0) return(
<div style={{marginBottom:24}}>
<h3 style={{marginBottom:8,color:"#4A235A"}}>Lots en cours de sechage ({seches.length})</h3>
<p style={{fontSize:11,color:"#888",marginBottom:10}}>Ces BTC ne peuvent pas etre livres avant la fin de leur sechage de {DUREE_SECHAGE} jours.</p>
{seches.map(function(p){
var pct=Math.round((DUREE_SECHAGE-p.jr)/DUREE_SECHAGE*100);
return(
<div key={p.id} style={{background:"white",borderRadius:10,padding:"10px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",borderLeft:"3px solid #E67E22"}}>
<div style={{flex:1,minWidth:140}}>
<div style={{fontWeight:600,fontSize:13}}>{getProduit(p.type).nom}</div>
<div style={{fontSize:11,color:"#999"}}>{p.date}</div>
</div>
<div style={{textAlign:"right"}}>
<div style={{fontWeight:700,fontSize:14,color:"#E67E22"}}>{p.jr} j restants</div>
<div style={{fontSize:11,color:"#888"}}>{(p.quantite||0).toLocaleString()} u</div>
</div>
<div style={{width:100}}>
<div style={{background:"#EEE",borderRadius:4,height:6}}>
<div style={{height:6,borderRadius:4,background:"#E67E22",width:pct+"%"}}></div>
</div>
<div style={{fontSize:10,color:"#888",marginTop:2}}>{pct}% seche</div>
</div>
</div>
);
})}
</div>
);
return null;
})()}
<h3 style={{marginBottom:10,color:"#4A235A"}}>Productions du jour ({prodAujourdHui.length})</h3>
        {prodAujourdHui.length===0?<p style={{color:"#888"}}>Aucune production enregistree aujourd'hui.</p>:
          prodAujourdHui.map(p=>{
var jrR=p.phase==="sechage"&&p.timestamp?joursRestants(p.timestamp):0;
return(
            <div key={p.id} style={{background:"white",borderRadius:10,padding:"10px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center",borderLeft:"3px solid "+(p.phase==="sechage"?"#E67E22":"#27AE60")}}>
              <div>
                <div style={{fontWeight:600}}>{getProduit(p.type).nom} <span style={{fontSize:12,color:"#888"}}>({p.phase==="sec"?"Sec":"Sechage"})</span></div>
                <div style={{fontSize:12,color:"#666"}}>+{p.quantite?p.quantite.toLocaleString():"-"} u</div>
                {p.phase==="sechage"&&jrR>0&&<div style={{fontSize:11,color:"#B7770D",marginTop:2}}>⏳ Mature dans {jrR} jour{jrR>1?"s":""}</div>}
                {p.phase==="sechage"&&jrR===0&&<div style={{fontSize:11,color:"#27AE60",marginTop:2}}>✅ Mature (seche)</div>}
              </div>
              {p.phase==="sechage"?(
<div style={{textAlign:"right"}}>
<span style={{background:"#FFF3CD",color:"#B7770D",borderRadius:10,padding:"2px 10px",fontSize:11,fontWeight:700}}>⏳ Sechage en cours</span>
<div style={{fontSize:10,color:"#888",marginTop:2}}>Mature dans ~28 jours</div>
</div>
):(
<span style={{background:"#EAFAF1",color:"#1E8449",borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:700}}>✅ Sec</span>
)}
            </div>
          )
        })
        }
      </div>
    </div>
  );
}




function App() {
  const [user, setUser] = useState(null);
  const [userData, setUserData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    var unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        try {
          var doc = await db.collection("users").doc(u.uid).get();
          setUserData(doc.exists ? doc.data() : { role:"inconnu" });
        } catch(e) { setUserData({ role:"inconnu" }); }
        setUser(u);
      } else {
        setUser(null); setUserData(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#8B1A10,#C0392B)"}}>
      <div style={{color:"white",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:12}}>🧱</div>
        <div style={{fontSize:18,fontWeight:700}}>BTC Manager</div>
        <div style={{fontSize:13,opacity:.8,marginTop:4}}>Terre et Eau - Mamoudzou</div>
      </div>
    </div>
  );

  if (!user) return <Login />;
  if (!userData) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#888"}}><div style={{fontSize:40}}>⏳</div><p>Chargement...</p></div>
    </div>
  );

  var role = userData.role ? userData.role.trim().toLowerCase() : "";
  if (role==="direction") return <DashboardDirection user={user} userData={userData} />;
  if (role==="chef_chantier") return <DashboardChef user={user} userData={userData} />;
  if (role==="resp_stock") return <DashboardStock user={user} userData={userData} />;
  if (role==="resp_production") return <DashboardProduction user={user} userData={userData} />;
  if (role==="comptable") return <DashboardComptable user={user} userData={userData} />;

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FDF6E3"}}>
      <div style={{textAlign:"center",padding:40,background:"white",borderRadius:16,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <h3 style={{color:"#C0392B",marginBottom:8}}>Role non reconnu</h3>
        <p style={{color:"#888",marginBottom:4}}>Role detecte: "{role}"</p>
        <p style={{color:"#888",fontSize:13}}>Contactez l'administrateur.</p>
        <button onClick={()=>auth.signOut()} style={{marginTop:16,padding:"8px 20px",background:"#C0392B",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Deconnexion</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
  </html>
