    setLoading(false);
  }
  return (<div><Toast msg={toast.msg} type={toast.type} /><div style={{ fontWeight:800, fontSize:17, marginBottom:12 }}>Gestion des utilisateurs</div><div style={C.card}><div style={{ fontWeight:700, marginBottom:12 }}>Creer un compte</div><form onSubmit={createUser} style={{ display:"flex", flexDirection:"column", gap:10 }}><input value={name} onChange={function(e){setName(e.target.value);}} required placeholder="Nom complet" style={C.input} /><input type="email" value={email} onChange={function(e){setEmail(e.target.value);}} required placeholder="Email" style={C.input} /><input type="password" value={pwd} onChange={function(e){setPwd(e.target.value);}} required minLength={6} placeholder="Mot de passe (6+ car.)" style={C.input} /><select value={role} onChange={function(e){setRole(e.target.value);}} style={C.input}>{Object.entries(roleLabels).map(function(e){ return <option key={e[0]} value={e[0]}>{roleIcons[e[0]]} {e[1]}</option>; })}</select>{role==="chef_chantier" && <input value={chantier} onChange={function(e){setChantier(e.target.value);}} required placeholder="Nom du chantier" style={C.input} />}<button type="submit" disabled={loading} style={C.btn()}>{loading?"...":"Creer le compte"}</button></form></div><div style={{ fontWeight:700, marginBottom:8 }}>Comptes existants ({users.length})</div>{users.map(function(u) { return (<div key={u.id} style={{ ...C.card, display:"flex", alignItems:"center", gap:12 }}><div style={{ fontSize:24, flexShrink:0 }}>{roleIcons[u.role]||"?"}</div><div style={{ flex:1 }}><div style={{ fontWeight:600, fontSize:13 }}>{u.name||"-"}</div><div style={{ fontSize:11, color:"#9ca3af" }}>{u.email}</div>{u.chantier && <div style={{ fontSize:11, color:"#1d4ed8" }}>Chantier : {u.chantier}</div>}</div><span style={C.pill("#f3f4f6","#374151")}>{roleLabels[u.role]||u.role}</span></div>); })}</div>);
}
function DirectionApp(props) {
  var user=props.user; var userDoc=props.userDoc;
  var s=useState("dashboard"); var tab=s[0]; var setTab=s[1];
  var s2=useState([]); var commandes=s2[0]; var setCommandes=s2[1];
  var s3=useState([]); var cmdAttente=s3[0]; var setCmdAttente=s3[1];
  var s4=useState([]); var users=s4[0]; var setUsers=s4[1];
  var stock=useStock(); var prods=stock.prods; var sorties=stock.sorties; var stockSech=stock.stockSech; var stockPret=stock.stockPret; var cmdValidees=stock.cmdValidees;
  var tabs = [{id:"dashboard",label:"Dashboard"},{id:"production",label:"Production"},{id:"stock",label:"Stock"},{id:"commandes",label:"Commandes"},{id:"chantiers",label:"Chantiers"},{id:"utilisateurs",label:"Utilisateurs"}];
  useEffect(function() {
    var u1 = db.collection("commandes").orderBy("timestamp","desc").limit(200).onSnapshot(function(s){setCommandes(s.docs.map(function(d){return Object.assign({id:d.id},d.data());}));});
    var u2 = db.collection("commandes").where("status","==","En attente").orderBy("timestamp","desc").onSnapshot(function(s){setCmdAttente(s.docs.map(function(d){return Object.assign({id:d.id},d.data());}));});
    var u3 = db.collection("users").orderBy("name").onSnapshot(function(s){setUsers(s.docs.map(function(d){return Object.assign({id:d.id},d.data());}));});
    return function(){ u1(); u2(); u3(); };
  }, []);
  var todayProds = prods.filter(function(p){return p.date===todayStr();});
  var todaySorties = sorties.filter(function(s){return s.date===todayStr();});
  return (<div style={{ minHeight:"100vh", background:"#FDF6E3" }}><NavBar userDoc={userDoc} role="direction" tab={tab} setTab={setTab} tabs={tabs} badge={cmdAttente.length} /><div style={C.page} className="fade-in">{tab==="dashboard" && <DashboardTab todayProds={todayProds} todaySorties={todaySorties} stockSech={stockSech} stockPret={stockPret} cmdAttente={cmdAttente} cmdValidees={cmdValidees} />}{tab==="production" && <ProdListTab prods={prods} title="Toutes les productions" />}{tab==="stock" && <div><div style={{marginBottom:8}}><PretTab stockPret={stockPret} showPrix={true} /></div><SechageTab stockSech={stockSech} /></div>}{tab==="commandes" && <AllCmdTab commandes={commandes} />}{tab==="chantiers" && <ChantierRecapTab sorties={sorties} />}{tab==="utilisateurs" && <UsersTab users={users} />}</div></div>);
}
function PendingScreen(props) {
  return (<div style={{ minHeight:"100vh", background:"#FDF6E3", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}><div style={{ background:"#fff", borderRadius:20, padding:28, maxWidth:340, textAlign:"center", boxShadow:"0 4px 24px rgba(0,0,0,.1)" }}><div style={{ fontSize:48, marginBottom:12 }}>⏳</div><div style={{ fontWeight:800, fontSize:18, marginBottom:8 }}>Compte en cours de configuration</div><div style={{ color:"#6b7280", fontSize:13 }}>Contactez votre responsable Direction.</div><div style={{ color:"#9ca3af", fontSize:11, marginTop:8 }}>{props.user.email}</div><button onClick={function(){auth.signOut();}} style={{ ...C.btn("#374151"), marginTop:16 }}>Deconnexion</button></div></div>);
}
function App() {
  var s1=useState(false); var fbReady=s1[0]; var setFbReady=s1[1];
  var s2=useState(null); var user=s2[0]; var setUser=s2[1];
  var s3=useState(null); var userDoc=s3[0]; var setUserDoc=s3[1];
  var s4=useState(true); var loading=s4[0]; var setLoading=s4[1];
  useEffect(function() { try { initFB(); setFbReady(true); } catch(e) { setLoading(false); } }, []);
  useEffect(function() {
    if (!fbReady) return;
    return auth.onAuthStateChanged(async function(u) {
      setUser(u);
      if (u) { try { var doc = await db.collection("users").doc(u.uid).get(); setUserDoc(doc.exists ? doc.data() : null); } catch(e) { setUserDoc(null); } }
      else { setUserDoc(null); }
      setLoading(false);
    });
  }, [fbReady]);
  if (loading) return (<div style={{ minHeight:"100vh", background:"#FDF6E3", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}><div style={{ fontSize:52 }}>🧱</div><div style={{ color:"#9ca3af", fontSize:14 }}>Chargement...</div></div>);
  if (!user) return <LoginScreen />;
  var role = userDoc && userDoc.role ? userDoc.role : null;
  if (!role) return <PendingScreen user={user} />;
  if (role==="chef_chantier") return <ChefApp user={user} userDoc={userDoc} />;
  if (role==="production") return <ProductionApp user={user} userDoc={userDoc} />;
  if (role==="stock") return <StockApp user={user} userDoc={userDoc} />;
  if (role==="direction") return <DirectionApp user={user} userDoc={userDoc} />;
  return <PendingScreen user={user} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
