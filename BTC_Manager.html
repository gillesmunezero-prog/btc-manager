<script type="text/babel">
const { useState, useEffect } = React;

const FIREBASE_CONFIG = {

// CATALOGUE COMPLET TERRE ET EAU

const FOURNITURES = [
  { id: "Hydrofuge", nom: "Hydrofuge", cond: "Bidon 20L", prix: 250, usage: "Traitement hydrofuge de facade" },
  { id: "Mortier Briki", nom: "Mortier Briki", cond: "Sac 25kg", prix: 25, usage: "Mortier de montage special sans ciment pour BTC" },

];

const TYPES_BTC = CATALOGUE.map(function(p) { return p.id; });
const STOCK_CIBLE = 10000;
const STOCK_ALERTE = 7500;

function couleurUrgence(total) {
  if (total < STOCK_ALERTE) return "#C0392B";
  if (total < STOCK_CIBLE) return "#E67E22";
  return "#27AE60";
}
function libelleUrgence(total) {
  if (total < STOCK_ALERTE) return "ALERTE";
  if (total < STOCK_CIBLE) return "A PRODUIRE";
  return "OK";
}
function getProduit(id) {
  return CATALOGUE.find(function(p) { return p.id === id; }) || { nom: id, dim: "", prix: 0 };
}

function Login() {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const handleLogin = async () => {
    setLoading(true); setError("");
    try { await auth.signInWithEmailAndPassword(email, password); }
    catch (e) { setError("Email ou mot de passe incorrect"); }
    setLoading(false);
  };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#8B1A10,#C0392B)"}}>
      <div style={{background:"white",borderRadius:16,padding:36,width:340,boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>🧱</div>
          <h2 style={{color:"#C0392B",fontWeight:700}}>BTC Manager</h2>
          <p style={{color:"#888",fontSize:13}}>Terre et Eau - Mamoudzou</p>
        </div>
        {error && <div style={{background:"#FFECEC",color:"#C0392B",padding:"8px 12px",borderRadius:8,marginBottom:12,fontSize:13}}>{error}</div>}
        <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14}} />
        <input type="password" placeholder="Mot de passe" value={password} onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #ddd",marginBottom:16,fontSize:14}} />
        <button onClick={handleLogin} disabled={loading}
          style={{width:"100%",padding:"11px",background:"#C0392B",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:15}}>
          {loading ? "Connexion..." : "Se connecter"}
        </button>
      </div>
    </div>
  );
}

function DashboardDirection({ user, userData }) {
  const [tab, setTab] = useState("stock");
  const [stocks, setStocks] = useState({});
  const [productions, setProductions] = useState([]);
  const [commandes, setCommandes] = useState([]);
  const [utilisateurs, setUtilisateurs] = useState([]);
  const [newEmail, setNewEmail] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [newRole, setNewRole] = useState("chef_chantier");
  const [newNom, setNewNom] = useState("");
  const [msgUser, setMsgUser] = useState("");

  useEffect(() => {
    var u1 = db.collection("stocks").onSnapshot(snap => {
      var s = {}; snap.docs.forEach(d => { s[d.id] = d.data(); }); setStocks(s);
    });
    var u2 = db.collection("productions").orderBy("date","desc").onSnapshot(snap => {
      setProductions(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var u3 = db.collection("commandes").orderBy("timestamp","desc").onSnapshot(snap => {
      setCommandes(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var u4 = db.collection("users").onSnapshot(snap => {
      setUtilisateurs(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    return () => { u1(); u2(); u3(); u4(); };
  }, []);

  const validerCmd = async (id) => {
    await db.collection("commandes").doc(id).update({ status:"Validee", validePar: userData.nom||user.email, valideAt: firebase.firestore.FieldValue.serverTimestamp() });
  };
  const refuserCmd = async (id) => {
    await db.collection("commandes").doc(id).update({ status:"Refusee" });
  };
  const creerUser = async () => {
    if (!newEmail||!newPassword||!newNom) { setMsgUser("Remplissez tous les champs"); return; }
    try {
      var res = await auth.createUserWithEmailAndPassword(newEmail, newPassword);
      await db.collection("users").doc(res.user.uid).set({ email:newEmail, nom:newNom, role:newRole, createdAt:firebase.firestore.FieldValue.serverTimestamp() });
      setMsgUser("Compte cree !"); setNewEmail(""); setNewPassword(""); setNewNom("");
    } catch(e) { setMsgUser("Erreur: "+e.message); }
  };

  const cmdAttente = commandes.filter(c=>c.status==="EnAttente");
  const cmdValidees = commandes.filter(c=>c.status==="Validee");
  const cmdLivrees = commandes.filter(c=>c.status==="Livree");

  const ts = (t) => ({ padding:"8px 14px", border:"none", cursor:"pointer", borderRadius:8, marginRight:6, marginBottom:6,
    background:tab===t?"#C0392B":"#F5E6D3", color:tab===t?"white":"#2C1810", fontWeight:tab===t?700:500, fontSize:13 });

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#8B1A10,#C0392B)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span style={{fontSize:20}}>🧱</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Direction - {userData.nom||user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:"12px 16px",display:"flex",flexWrap:"wrap"}}>
        <button style={ts("stock")} onClick={()=>setTab("stock")}>Stock</button>
        <button style={ts("production")} onClick={()=>setTab("production")}>Production</button>
        <button style={ts("commandes")} onClick={()=>setTab("commandes")}>
          Commandes {cmdAttente.length>0&&<span style={{background:"#E74C3C",color:"white",borderRadius:10,padding:"1px 6px",marginLeft:4,fontSize:11}}>{cmdAttente.length}</span>}
        </button>
        <button style={ts("finance")} onClick={()=>setTab("finance")}>Finances</button>
        <button style={ts("catalogue")} onClick={()=>setTab("catalogue")}>Catalogue</button>
        <button style={ts("utilisateurs")} onClick={()=>setTab("utilisateurs")}>Utilisateurs</button>
      </div>
      <div style={{padding:"0 16px 24px"}}>

        {tab==="stock"&&(
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Etat du stock</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12}}>
              {CATALOGUE.map(prod=>{
                var s=stocks[prod.id]||{};
                var sec=s.sec||0; var sechage=s.sechage||0; var total=sec+sechage;
                var couleur=couleurUrgence(total);
                return(
                  <div key={prod.id} style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{prod.nom}</div>
                    <div style={{fontSize:11,color:"#999",marginBottom:8}}>{prod.dim}</div>
                    <div style={{fontSize:12,color:"#666"}}>Stock sec: <strong>{sec.toLocaleString()}</strong></div>
                    <div style={{fontSize:12,color:"#666"}}>En sechage: <strong>{sechage.toLocaleString()}</strong></div>
                    <div style={{margin:"6px 0 3px",background:"#EEE",borderRadius:4,height:6}}>
                      <div style={{height:6,borderRadius:4,background:couleur,width:Math.min(100,Math.round(total/STOCK_CIBLE*100))+"%"}}></div>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}>
                      <span style={{fontSize:12,fontWeight:700,color:couleur}}>{total.toLocaleString()} / {STOCK_CIBLE.toLocaleString()}</span>
                      <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,background:couleur,color:"white"}}>{libelleUrgence(total)}</span>
                    </div>
                    <div style={{fontSize:11,color:"#8B1A10",fontWeight:600,marginTop:6}}>{prod.prix.toFixed(2)} EUR/u</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab==="production"&&(
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Productions recentes</h3>
            {productions.length===0?<p style={{color:"#888"}}>Aucune production enregistree.</p>:(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:500}}>
                  <thead><tr style={{background:"#8B1A10",color:"white"}}>
                    <th style={{padding:"8px 10px",textAlign:"left"}}>Date</th>
                    <th style={{padding:"8px 10px"}}>Produit</th>
                    <th style={{padding:"8px 10px"}}>Quantite</th>
                    <th style={{padding:"8px 10px"}}>Phase</th>
                    <th style={{padding:"8px 10px"}}>Responsable</th>
                  </tr></thead>
                  <tbody>{productions.map((p,i)=>(
                    <tr key={p.id} style={{background:i%2===0?"white":"#FEF9F0",borderBottom:"1px solid #EEE"}}>
                      <td style={{padding:"7px 10px"}}>{p.date}</td>
                      <td style={{padding:"7px 10px",fontWeight:600}}>{getProduit(p.type).nom}</td>
                      <td style={{padding:"7px 10px",textAlign:"center"}}>{p.quantite?p.quantite.toLocaleString():"-"}</td>
                      <td style={{padding:"7px 10px",textAlign:"center"}}>{p.phase==="sec"?"Stock sec":"En sechage"}</td>
                      <td style={{padding:"7px 10px",textAlign:"center"}}>{p.responsable||"-"}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {tab==="commandes"&&(
          <div className="fade-in">
            <h3 style={{marginBottom:12,color:"#8B1A10"}}>A valider ({cmdAttente.length})</h3>
            {cmdAttente.length===0?<p style={{color:"#888",marginBottom:16}}>Aucune commande en attente.</p>:
              cmdAttente.map(cmd=>(
                <div key={cmd.id} style={{background:"white",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #E67E22"}}>
                  <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"flex-start"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:15}}>{getProduit(cmd.type).nom} - {cmd.quantite?cmd.quantite.toLocaleString():"-"} u</div>
                      <div style={{fontSize:12,color:"#666",marginTop:3}}>Par: {cmd.chefNom||cmd.chefEmail||"-"} | Client: {cmd.client||"-"}</div>
                      {cmd.notes&&<div style={{fontSize:12,color:"#888",marginTop:2}}>Note: {cmd.notes}</div>}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>validerCmd(cmd.id)} style={{background:"#27AE60",color:"white",border:"none",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:700}}>Valider</button>
                      <button onClick={()=>refuserCmd(cmd.id)} style={{background:"#E74C3C",color:"white",border:"none",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:700}}>Refuser</button>
                    </div>
                  </div>
                </div>
              ))
            }
            <h3 style={{marginBottom:10,marginTop:20,color:"#2980B9"}}>Validees ({cmdValidees.length})</h3>
            {cmdValidees.map(cmd=>(
              <div key={cmd.id} style={{background:"#EBF5FB",borderRadius:10,padding:12,marginBottom:8,borderLeft:"4px solid #2980B9"}}>
                <div style={{fontWeight:600}}>{getProduit(cmd.type).nom} - {cmd.quantite?cmd.quantite.toLocaleString():"-"} u</div>
                <div style={{fontSize:12,color:"#555",marginTop:2}}>Client: {cmd.client||"-"} | Valide par: {cmd.validePar||"-"}</div>
              </div>
            ))}
            <h3 style={{marginBottom:10,marginTop:20,color:"#27AE60"}}>Livrees ({cmdLivrees.length})</h3>
            {cmdLivrees.map(cmd=>(
              <div key={cmd.id} style={{background:"#EAFAF1",borderRadius:10,padding:12,marginBottom:8,borderLeft:"4px solid #27AE60"}}>
                <div style={{fontWeight:600}}>{getProduit(cmd.type).nom} - {cmd.quantite?cmd.quantite.toLocaleString():"-"} u</div>
                <div style={{fontSize:12,color:"#555",marginTop:2}}>Client: {cmd.client||"-"}</div>
              </div>
            ))}
          </div>
        )}

        {tab==="finance"&&(
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Valeur financiere du stock BTC</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12,marginBottom:20}}>
              {CATALOGUE.map(prod=>{
                var s=stocks[prod.id]||{};
                var total=(s.sec||0)+(s.sechage||0);
                var valeur=total*prod.prix;
                return(
                  <div key={prod.id} style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
                    <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{prod.nom}</div>
                    <div style={{fontSize:11,color:"#999",marginBottom:6}}>{prod.dim}</div>
                    <div style={{fontSize:12,color:"#666"}}>Stock: {total.toLocaleString()} u</div>
                    <div style={{fontSize:13,color:"#666"}}>Prix unit.: {prod.prix.toFixed(2)} EUR</div>
                    <div style={{fontSize:15,fontWeight:700,color:"#8B1A10",marginTop:6}}>{valeur.toLocaleString("fr-FR",{minimumFractionDigits:2})} EUR</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"#8B1A10",color:"white",borderRadius:12,padding:20,display:"inline-block",marginBottom:24}}>
              <div style={{fontSize:13,opacity:.8}}>VALEUR TOTALE STOCK BTC</div>
              <div style={{fontSize:26,fontWeight:700,marginTop:4}}>
                {CATALOGUE.reduce(function(acc,prod){
                  var s=stocks[prod.id]||{}; var total=(s.sec||0)+(s.sechage||0);
                  return acc+total*prod.prix;
                },0).toLocaleString("fr-FR",{minimumFractionDigits:2})} EUR
              </div>
            </div>
            <h3 style={{marginBottom:12,color:"#8B1A10"}}>Tarifs fournitures</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(230px,1fr))",gap:12}}>
              {FOURNITURES.map(f=>(
                <div key={f.id} style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>

                  <div style={{fontSize:11,color:"#999",marginBottom:4}}>{f.cond}</div>
                  <div style={{fontSize:12,color:"#666",marginBottom:6}}>{f.usage}</div>
                  <div style={{fontSize:15,fontWeight:700,color:"#8B1A10"}}>{f.prix.toFixed(2)} EUR</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="catalogue"&&(
          <div className="fade-in">
            <h3 style={{marginBottom:6,color:"#8B1A10"}}>Catalogue BTC - Terre et Eau</h3>
            <p style={{fontSize:12,color:"#888",marginBottom:16}}>226 Imp. Vilvilini 97600 Mamoudzou | SIRET: 93222797800016 | Tel: +262 639 57 92 44</p>
            <h4 style={{marginBottom:10,color:"#555"}}>Blocs de Terre Comprimee ({CATALOGUE.length} references)</h4>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,marginBottom:24}}>
              {CATALOGUE.map(prod=>(
                <div key={prod.id} style={{background:"white",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #C0392B"}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#2C1810",marginBottom:4}}>{prod.nom}</div>
                  <div style={{fontSize:12,color:"#888",marginBottom:4}}>Dim: {prod.dim}</div>
                  <div style={{fontSize:12,color:"#555",marginBottom:8}}>{prod.usage}</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#8B1A10"}}>{prod.prix.toFixed(2)} EUR/u</div>
                </div>
              ))}
            </div>
            <h4 style={{marginBottom:10,color:"#555"}}>Fournitures ({FOURNITURES.length} references)</h4>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
              {FOURNITURES.map(f=>(
                <div key={f.id} style={{background:"white",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #2980B9"}}>
                  <div style={{fontWeight:700,fontSize:14,color:"#2C1810",marginBottom:4}}>{f.nom}</div>
                  <div style={{fontSize:12,color:"#888",marginBottom:4}}>{f.cond}</div>
                  <div style={{fontSize:12,color:"#555",marginBottom:8}}>{f.usage}</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#8B1A10"}}>{f.prix.toFixed(2)} EUR</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="utilisateurs"&&(
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Creer un compte</h3>
            <div style={{background:"white",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",marginBottom:20,maxWidth:420}}>
              <input placeholder="Nom complet" value={newNom} onChange={e=>setNewNom(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
              <input placeholder="Email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
              <input type="password" placeholder="Mot de passe" value={newPassword} onChange={e=>setNewPassword(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
              <select value={newRole} onChange={e=>setNewRole(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14,background:"white"}}>
                <option value="chef_chantier">Chef de chantier</option>
                <option value="resp_stock">Responsable Stock</option>
                <option value="resp_production">Responsable Production</option>

              <button onClick={creerUser} style={{width:"100%",padding:"10px",background:"#C0392B",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Creer le compte</button>
            </div>
            <h3 style={{marginBottom:10,color:"#8B1A10"}}>Comptes existants ({utilisateurs.length})</h3>
            {utilisateurs.map(u=>(
              <div key={u.id} style={{background:"white",borderRadius:10,padding:"10px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                <div>
                  <div style={{fontWeight:600}}>{u.nom||u.email}</div>
                  <div style={{fontSize:12,color:"#888"}}>{u.email} | {u.role}</div>

            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function DashboardChef({ user, userData }) {
  const [type, setType] = useState(CATALOGUE[0].id);
  const [quantite, setQuantite] = useState("");
  const [client, setClient] = useState("");
  const [notes, setNotes] = useState("");
  const [msg, setMsg] = useState("");
  const [commandes, setCommandes] = useState([]);

  useEffect(() => {
    var unsub = db.collection("commandes").onSnapshot(snap => {
      var all = snap.docs.map(d => Object.assign({id:d.id}, d.data()));
      setCommandes(all.filter(c => c.chefUid === user.uid));
    });
    return unsub;
  }, []);

  const passerCommande = async () => {
    if (!quantite||!client) { setMsg("Remplissez la quantite et le client"); return; }
    try {
      await db.collection("commandes").add({
        type, quantite: parseInt(quantite), client, notes,
        chefUid: user.uid, chefEmail: user.email, chefNom: userData.nom||user.email,
        status: "EnAttente", timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      setMsg("Commande envoyee ! En attente de validation Direction.");
      setQuantite(""); setClient(""); setNotes("");
    } catch(e) { setMsg("Erreur: "+e.message); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#1A5276,#2980B9)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span style={{fontSize:20}}>👷</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Chef de chantier - {userData.nom||user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:14,color:"#1A5276"}}>Passer une commande</h3>
        <div style={{background:"white",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",maxWidth:440,marginBottom:24}}>
          <select value={type} onChange={e=>setType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,background:"white",fontSize:14}}>
            {CATALOGUE.map(p=><option key={p.id} value={p.id}>{p.nom} ({p.dim})</option>)}
          </select>
          <input type="number" placeholder="Quantite" value={quantite} onChange={e=>setQuantite(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
          <input placeholder="Nom du client" value={client} onChange={e=>setClient(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
          <textarea placeholder="Notes (optionnel)" value={notes} onChange={e=>setNotes(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14,resize:"vertical",minHeight:50}} />
          {msg&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msg.includes("envoyee")?"#EBF5FB":"#FFECEC",color:msg.includes("envoyee")?"#1A5276":"#C0392B"}}>{msg}</div>}
          <button onClick={passerCommande} style={{width:"100%",padding:"10px",background:"#2980B9",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Envoyer la commande</button>
        </div>
        <h3 style={{marginBottom:10,color:"#1A5276"}}>Mes commandes ({commandes.length})</h3>
        {commandes.length===0?<p style={{color:"#888"}}>Aucune commande.</p>:
          commandes.map(c=>(
            <div key={c.id} style={{background:"white",borderRadius:10,padding:"12px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderLeft:"4px solid "+(c.status==="Livree"?"#27AE60":c.status==="Validee"?"#2980B9":c.status==="Refusee"?"#E74C3C":"#E67E22")}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
                <div style={{fontWeight:600}}>{getProduit(c.type).nom} - {c.quantite?c.quantite.toLocaleString():"-"} u</div>
                <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:c.status==="Livree"?"#EAFAF1":c.status==="Validee"?"#EBF5FB":c.status==="Refusee"?"#FFECEC":"#FEF9E7",color:c.status==="Livree"?"#1E8449":c.status==="Validee"?"#1A5276":c.status==="Refusee"?"#C0392B":"#B7950B"}}>{c.status}</span>
              </div>
              <div style={{fontSize:12,color:"#888",marginTop:3}}>Client: {c.client||"-"}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function DashboardStock({ user, userData }) {
  const [commandes, setCommandes] = useState([]);
  const [stocks, setStocks] = useState({});

  useEffect(() => {
    var u1 = db.collection("commandes").where("status","==","Validee").onSnapshot(snap => {
      setCommandes(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var u2 = db.collection("stocks").onSnapshot(snap => {
      var s = {}; snap.docs.forEach(d => { s[d.id] = d.data(); }); setStocks(s);
    });
    return () => { u1(); u2(); };
  }, []);

  const marquerEnvoye = async (cmdId, type, quantite) => {
    var s = stocks[type]||{};
    var newSec = Math.max(0, (s.sec||0) - quantite);
    await db.collection("commandes").doc(cmdId).update({ status:"Livree", livrePar:userData.nom||user.email, livreAt:firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection("stocks").doc(type).set({ sec:newSec, sechage:s.sechage||0 }, { merge:true });
  };

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#145A32,#1E8449)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span style={{fontSize:20}}>📦</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Resp. Stock - {userData.nom||user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:14,color:"#145A32"}}>Etat du stock</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10,marginBottom:24}}>
          {CATALOGUE.map(prod=>{
            var s=stocks[prod.id]||{}; var sec=s.sec||0; var sechage=s.sechage||0; var total=sec+sechage;
            var couleur=couleurUrgence(total);
            return(
              <div key={prod.id} style={{background:"white",borderRadius:12,padding:12,boxShadow:"0 2px 6px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur}}>
                <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{prod.nom}</div>
                <div style={{fontSize:11,color:"#999",marginBottom:6}}>{prod.dim}</div>
                <div style={{fontSize:12,color:"#666"}}>Sec: <strong>{sec.toLocaleString()}</strong></div>
                <div style={{fontSize:12,color:"#666"}}>Sechage: <strong>{sechage.toLocaleString()}</strong></div>
                <div style={{fontSize:12,fontWeight:700,color:couleur,marginTop:4}}>Total: {total.toLocaleString()}</div>
              </div>
            );
          })}
        </div>
        <h3 style={{marginBottom:10,color:"#145A32"}}>Commandes a preparer ({commandes.length})</h3>
        {commandes.length===0?<p style={{color:"#888"}}>Aucune commande validee en attente.</p>:
          commandes.map(cmd=>(
            <div key={cmd.id} style={{background:"white",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #2980B9"}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{getProduit(cmd.type).nom}</div>
                  <div style={{fontSize:13,color:"#444",marginTop:2}}>Quantite: {cmd.quantite?cmd.quantite.toLocaleString():"-"} u</div>
                  <div style={{fontSize:12,color:"#666",marginTop:2}}>Client: {cmd.client||"-"} | Valide par: {cmd.validePar||"Direction"}</div>
                </div>
                <button onClick={()=>marquerEnvoye(cmd.id,cmd.type,cmd.quantite||0)} style={{background:"#1E8449",color:"white",border:"none",padding:"9px 18px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>Commande envoyee ✓</button>
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function DashboardProduction({ user, userData }) {
  const [stocks, setStocks] = useState({});
  const [productions, setProductions] = useState([]);
  const [saisieType, setSaisieType] = useState(CATALOGUE[0].id);
  const [saisieQte, setSaisieQte] = useState("");
  const [saisiePhase, setSaisiePhase] = useState("sec");
  const [msg, setMsg] = useState("");
  const dateAujourdHui = new Date().toLocaleDateString("fr-FR");

  useEffect(() => {
    var u1 = db.collection("stocks").onSnapshot(snap => {
      var s = {}; snap.docs.forEach(d => { s[d.id] = d.data(); }); setStocks(s);
    });
    var u2 = db.collection("productions").onSnapshot(snap => {
      setProductions(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    return () => { u1(); u2(); };
  }, []);

  var typesParUrgence = CATALOGUE.map(function(prod) {
    var s = stocks[prod.id]||{};
    var sec = s.sec||0; var sechage = s.sechage||0; var total = sec+sechage;
    return { prod:prod, sec:sec, sechage:sechage, total:total };
  }).sort(function(a,b) { return a.total - b.total; });

  var prodAujourdHui = productions.filter(function(p) { return p.date === dateAujourdHui; });

  var enregistrer = async function() {
    if (!saisieType||!saisieQte) { setMsg("Choisissez un type et entrez la quantite"); return; }
    var qte = parseInt(saisieQte);
    if (isNaN(qte)||qte<=0) { setMsg("Quantite invalide"); return; }
    try {
      await db.collection("productions").add({
        type:saisieType, quantite:qte, phase:saisiePhase,
        date:dateAujourdHui, responsable:userData.nom||user.email,
        responsableUid:user.uid, statut:"Valide",
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
      });
      var s = stocks[saisieType]||{};
      var upd = {};
      if (saisiePhase==="sec") { upd.sec=(s.sec||0)+qte; } else { upd.sechage=(s.sechage||0)+qte; }
      await db.collection("stocks").doc(saisieType).set(upd, { merge:true });
      setMsg("Production enregistree ! Stock mis a jour.");
      setSaisieQte("");
    } catch(e) { setMsg("Erreur: "+e.message); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#4A235A,#6C3483)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><span style={{fontSize:20}}>🏭</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Resp. Production - {userData.nom||user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:6,color:"#4A235A"}}>Priorites du jour - {dateAujourdHui}</h3>
        <p style={{fontSize:12,color:"#888",marginBottom:14}}>Cible: {STOCK_CIBLE.toLocaleString()} u | Alerte si total inferieur a {STOCK_ALERTE.toLocaleString()} u</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10,marginBottom:24}}>
          {typesParUrgence.map(function(item, idx) {
            var couleur = couleurUrgence(item.total);
            var pct = Math.min(100, Math.round(item.total/STOCK_CIBLE*100));
            var manque = Math.max(0, STOCK_CIBLE-item.total);
            return (
              <div key={item.prod.id} style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur,position:"relative"}}>
                <div style={{position:"absolute",top:10,right:10,background:couleur,color:"white",borderRadius:16,padding:"2px 8px",fontSize:11,fontWeight:700}}>{"#"+(idx+1)}</div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:2,paddingRight:40}}>{item.prod.nom}</div>
                <div style={{fontSize:11,color:"#999",marginBottom:6}}>{item.prod.dim}</div>
                <div style={{fontSize:12,color:"#666"}}>Sec: <strong>{item.sec.toLocaleString()}</strong></div>
                <div style={{fontSize:12,color:"#666"}}>Sechage: <strong>{item.sechage.toLocaleString()}</strong></div>
                <div style={{margin:"6px 0 3px",background:"#EEE",borderRadius:4,height:6}}>
                  <div style={{height:6,borderRadius:4,background:couleur,width:pct+"%"}}></div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:3}}>
                  <span style={{fontSize:12,fontWeight:700,color:couleur}}>{item.total.toLocaleString()} / {STOCK_CIBLE.toLocaleString()}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10,background:couleur,color:"white"}}>{libelleUrgence(item.total)}</span>
                </div>
                {item.total<STOCK_CIBLE&&<div style={{fontSize:11,color:"#888",marginTop:3}}>A produire: <strong style={{color:couleur}}>{manque.toLocaleString()}</strong></div>}
              </div>
            );
          })}
        </div>
        <h3 style={{marginBottom:14,color:"#4A235A"}}>Enregistrer une production</h3>
        <div style={{background:"white",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",maxWidth:440,marginBottom:24}}>
          <select value={saisieType} onChange={e=>setSaisieType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,background:"white",fontSize:14}}>
            {typesParUrgence.map(function(item) {
              return <option key={item.prod.id} value={item.prod.id}>{item.prod.nom} - stock: {item.total.toLocaleString()}</option>;
            })}
          </select>
          <select value={saisiePhase} onChange={e=>setSaisiePhase(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,background:"white",fontSize:14}}>
            <option value="sec">Stock sec (seche)</option>
            <option value="sechage">En sechage (frais)</option>
          </select>
          <input type="number" placeholder="Quantite produite" value={saisieQte} onChange={e=>setSaisieQte(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14}} />
          {msg&&<div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msg.includes("enregistree")?"#EAFAF1":"#FFECEC",color:msg.includes("enregistree")?"#1E8449":"#C0392B"}}>{msg}</div>}
          <button onClick={enregistrer} style={{width:"100%",padding:"10px",background:"#6C3483",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Enregistrer la production</button>
        </div>
        <h3 style={{marginBottom:10,color:"#4A235A"}}>Productions du jour ({prodAujourdHui.length})</h3>
        {prodAujourdHui.length===0?<p style={{color:"#888"}}>Aucune production enregistree aujourd'hui.</p>:
          prodAujourdHui.map(p=>(
            <div key={p.id} style={{background:"white",borderRadius:10,padding:"10px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:600}}>{getProduit(p.type).nom} <span style={{fontSize:12,color:"#888"}}>({p.phase==="sec"?"sec":"sechage"})</span></div>
                <div style={{fontSize:12,color:"#666"}}>+{p.quantite?p.quantite.toLocaleString():"-"} u</div>
              </div>
              <span style={{background:"#EAFAF1",color:"#1E8449",borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:700}}>OK</span>
            </div>
          ))
        }
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [userData, setUserData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    var unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        try {
          var doc = await db.collection("users").doc(u.uid).get();
          setUserData(doc.exists ? doc.data() : { role:"inconnu" });
        } catch(e) { setUserData({ role:"inconnu" }); }
        setUser(u);
      } else {
        setUser(null); setUserData(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#8B1A10,#C0392B)"}}>
      <div style={{color:"white",textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:12}}>🧱</div>
        <div style={{fontSize:18,fontWeight:700}}>BTC Manager</div>
        <div style={{fontSize:13,opacity:.8,marginTop:4}}>Terre et Eau - Mamoudzou</div>
      </div>
    </div>
  );

  if (!user) return <Login />;
  if (!userData) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#888"}}><div style={{fontSize:40}}>⏳</div><p>Chargement...</p></div>
    </div>
  );

  var role = userData.role ? userData.role.trim().toLowerCase() : "";
  if (role==="direction") return <DashboardDirection user={user} userData={userData} />;
  if (role==="chef_chantier") return <DashboardChef user={user} userData={userData} />;
  if (role==="resp_stock") return <DashboardStock user={user} userData={userData} />;
  if (role==="resp_production") return <DashboardProduction user={user} userData={userData} />;

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FDF6E3"}}>
      <div style={{textAlign:"center",padding:40,background:"white",borderRadius:16,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <h3 style={{color:"#C0392B",marginBottom:8}}>Role non reconnu</h3>
        <p style={{color:"#888",marginBottom:4}}>Role detecte: "{role}"</p>
        <p style={{color:"#888",fontSize:13}}>Contactez l'administrateur.</p>
        <button onClick={()=>auth.signOut()} style={{marginTop:16,padding:"8px 20px",background:"#C0392B",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Deconnexion</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
