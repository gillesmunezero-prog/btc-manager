<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", Arial, sans-serif; background: #FDF6E3; color: #2C1810; }
input, select, textarea, button { font-family: inherit; }
.fade-in { animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCqmFuVHJi-KgAvjnB0b5_qdz9Cj_DCNQY",
  authDomain: "btc-manager-2d64f.firebaseapp.com",
  projectId: "btc-manager-2d64f",
  storageBucket: "btc-manager-2d64f.firebasestorage.app",
  messagingSenderId: "775030733685",
  appId: "1:775030733685:web:06e9d20c8e4c1f2adb4da9"
};

if (!firebase.apps.length) { firebase.initializeApp(FIREBASE_CONFIG); }
const auth = firebase.auth();
const db = firebase.firestore();

const TYPES_BTC = ["BTC 14cm", "BTC 10cm", "BTC 7cm", "BTC Plein", "BTC Angle"];
const STOCK_CIBLE = 10000;
const STOCK_ALERTE = 7500;

function couleurUrgence(total) {
  if (total < STOCK_ALERTE) return "#C0392B";
  if (total < STOCK_CIBLE) return "#E67E22";
  return "#27AE60";
}
function libelleUrgence(total) {
  if (total < STOCK_ALERTE) return "ALERTE";
  if (total < STOCK_CIBLE) return "A PRODUIRE";
  return "OK";
}

function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setLoading(true); setError("");
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
      setError("Email ou mot de passe incorrect");
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#8B1A10,#C0392B)"}}>
      <div style={{background:"white",borderRadius:16,padding:36,width:320,boxShadow:"0 8px 32px rgba(0,0,0,0.25)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:48,marginBottom:8}}>🧱</div>
          <h2 style={{color:"#C0392B",fontWeight:700}}>BTC Manager</h2>
          <p style={{color:"#888",fontSize:13}}>Blocs de Terre Comprimee</p>
        </div>
        {error && <div style={{background:"#FFECEC",color:"#C0392B",padding:"8px 12px",borderRadius:8,marginBottom:12,fontSize:13}}>{error}</div>}
        <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)}
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14}} />
        <input type="password" placeholder="Mot de passe" value={password} onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #ddd",marginBottom:16,fontSize:14}} />
        <button onClick={handleLogin} disabled={loading}
          style={{width:"100%",padding:"11px",background:"#C0392B",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:15}}>
          {loading ? "Connexion..." : "Se connecter"}
        </button>
      </div>
    </div>
  );
}

function DashboardDirection({ user, userData }) {
  const [tab, setTab] = useState("production");
  const [productions, setProductions] = useState([]);
  const [stocks, setStocks] = useState({});
  const [commandes, setCommandes] = useState([]);
  const [utilisateurs, setUtilisateurs] = useState([]);
  const [newEmail, setNewEmail] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [newRole, setNewRole] = useState("chef_chantier");
  const [newNom, setNewNom] = useState("");
  const [msgUser, setMsgUser] = useState("");

  useEffect(() => {
    const unsubProd = db.collection("productions").orderBy("date","desc").onSnapshot(snap => {
      setProductions(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    const unsubStock = db.collection("stocks").onSnapshot(snap => {
      var s = {};
      snap.docs.forEach(d => { s[d.id] = d.data(); });
      setStocks(s);
    });
    const unsubCmd = db.collection("commandes").orderBy("timestamp","desc").onSnapshot(snap => {
      setCommandes(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    const unsubUsers = db.collection("users").onSnapshot(snap => {
      setUtilisateurs(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    return () => { unsubProd(); unsubStock(); unsubCmd(); unsubUsers(); };
  }, []);

  const validerCommande = async (cmdId) => {
    await db.collection("commandes").doc(cmdId).update({ status: "Validee", validePar: userData.nom || user.email, valideAt: firebase.firestore.FieldValue.serverTimestamp() });
  };

  const refuserCommande = async (cmdId) => {
    await db.collection("commandes").doc(cmdId).update({ status: "Refusee" });
  };

  const creerUtilisateur = async () => {
    if (!newEmail || !newPassword || !newNom) { setMsgUser("Remplissez tous les champs"); return; }
    try {
      var res = await auth.createUserWithEmailAndPassword(newEmail, newPassword);
      await db.collection("users").doc(res.user.uid).set({ email: newEmail, nom: newNom, role: newRole, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      setMsgUser("Compte cree avec succes !");
      setNewEmail(""); setNewPassword(""); setNewNom("");
    } catch(e) { setMsgUser("Erreur: " + e.message); }
  };

  const cmdEnAttente = commandes.filter(c => c.status === "EnAttente");
  const cmdValidees = commandes.filter(c => c.status === "Validee");
  const cmdLivrees = commandes.filter(c => c.status === "Livree");

  var prix = { "BTC 14cm": 850, "BTC 10cm": 700, "BTC 7cm": 600, "BTC Plein": 750, "BTC Angle": 900 };

  const tabStyle = (t) => ({
    padding: "8px 14px", border: "none", cursor: "pointer", borderRadius: 8, marginRight: 6, marginBottom: 6,
    background: tab === t ? "#C0392B" : "#F5E6D3", color: tab === t ? "white" : "#2C1810", fontWeight: tab === t ? 700 : 500, fontSize: 13
  });

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#8B1A10,#C0392B)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontSize:22}}>🧱</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Direction</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:"12px 16px",display:"flex",flexWrap:"wrap"}}>
        <button style={tabStyle("production")} onClick={()=>setTab("production")}>Production</button>
        <button style={tabStyle("stock")} onClick={()=>setTab("stock")}>Stock</button>
        <button style={tabStyle("commandes")} onClick={()=>setTab("commandes")}>Commandes {cmdEnAttente.length>0 && <span style={{background:"#E74C3C",color:"white",borderRadius:10,padding:"1px 6px",marginLeft:4,fontSize:11}}>{cmdEnAttente.length}</span>}</button>
        <button style={tabStyle("finance")} onClick={()=>setTab("finance")}>Finances</button>
        <button style={tabStyle("utilisateurs")} onClick={()=>setTab("utilisateurs")}>Utilisateurs</button>
      </div>

      <div style={{padding:"0 16px 20px"}}>
        {tab === "production" && (
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Productions recentes</h3>
            {productions.length === 0 ? <p style={{color:"#888"}}>Aucune production enregistree.</p> : (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr style={{background:"#8B1A10",color:"white"}}>
                    <th style={{padding:"8px",textAlign:"left"}}>Date</th><th style={{padding:"8px"}}>Type BTC</th>
                    <th style={{padding:"8px"}}>Quantite</th><th style={{padding:"8px"}}>Responsable</th><th style={{padding:"8px"}}>Statut</th>
                  </tr></thead>
                  <tbody>{productions.map((p,i) => (
                    <tr key={p.id} style={{background:i%2===0?"white":"#FEF9F0",borderBottom:"1px solid #EEE"}}>
                      <td style={{padding:"7px 8px"}}>{p.date}</td>
                      <td style={{padding:"7px 8px",textAlign:"center",fontWeight:600}}>{p.type}</td>
                      <td style={{padding:"7px 8px",textAlign:"center"}}>{p.quantite ? p.quantite.toLocaleString() : "-"}</td>
                      <td style={{padding:"7px 8px",textAlign:"center"}}>{p.responsable || "-"}</td>
                      <td style={{padding:"7px 8px",textAlign:"center"}}><span style={{padding:"2px 8px",borderRadius:10,fontSize:11,background:p.statut==="Valide"?"#D5F5E3":"#FEF9E7",color:p.statut==="Valide"?"#1E8449":"#B7950B",fontWeight:700}}>{p.statut || "En cours"}</span></td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {tab === "stock" && (
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Etat du stock</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
              {TYPES_BTC.map(type => {
                var s = stocks[type] || {};
                var sec = s.sec || 0;
                var sechage = s.sechage || 0;
                var total = sec + sechage;
                var couleur = couleurUrgence(total);
                return (
                  <div key={type} style={{background:"white",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur}}>
                    <div style={{fontWeight:700,marginBottom:8,fontSize:14}}>{type}</div>
                    <div style={{fontSize:12,color:"#666"}}>Stock sec: <strong>{sec.toLocaleString()}</strong></div>
                    <div style={{fontSize:12,color:"#666"}}>En sechage: <strong>{sechage.toLocaleString()}</strong></div>
                    <div style={{fontSize:13,fontWeight:700,color:couleur,marginTop:6}}>Total: {total.toLocaleString()} / {STOCK_CIBLE.toLocaleString()}</div>
                    <div style={{marginTop:8,background:"#EEE",borderRadius:4,height:6}}>
                      <div style={{height:6,borderRadius:4,background:couleur,width:Math.min(100,Math.round(total/STOCK_CIBLE*100))+"%"}}></div>
                    </div>
                    <div style={{fontSize:11,fontWeight:700,color:couleur,marginTop:4}}>{libelleUrgence(total)}</div>
                    <div style={{fontSize:11,color:"#888",marginTop:2}}>Prix: {prix[type] ? prix[type].toLocaleString() + " FCFA" : "-"}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {tab === "commandes" && (
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Commandes a valider ({cmdEnAttente.length})</h3>
            {cmdEnAttente.length === 0 ? <p style={{color:"#888",marginBottom:20}}>Aucune commande en attente.</p> : (
              cmdEnAttente.map(cmd => (
                <div key={cmd.id} style={{background:"white",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #E67E22"}}>
                  <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:15}}>{cmd.type} - {cmd.quantite ? cmd.quantite.toLocaleString() : "-"} BTC</div>
                      <div style={{fontSize:12,color:"#666",marginTop:4}}>Par: {cmd.chefNom || cmd.chefEmail || "-"} | Client: {cmd.client || "-"}</div>
                      <div style={{fontSize:12,color:"#888"}}>{cmd.notes || ""}</div>
                    </div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <button onClick={()=>validerCommande(cmd.id)} style={{background:"#27AE60",color:"white",border:"none",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:700}}>Valider</button>
                      <button onClick={()=>refuserCommande(cmd.id)} style={{background:"#E74C3C",color:"white",border:"none",padding:"8px 16px",borderRadius:8,cursor:"pointer",fontWeight:700}}>Refuser</button>
                    </div>
                  </div>
                </div>
              ))
            )}
            <h3 style={{marginBottom:10,marginTop:20,color:"#8B1A10"}}>Commandes validees ({cmdValidees.length})</h3>
            {cmdValidees.length === 0 ? <p style={{color:"#888",marginBottom:20}}>Aucune commande validee en attente de livraison.</p> : (
              cmdValidees.map(cmd => (
                <div key={cmd.id} style={{background:"#EBF5FB",borderRadius:12,padding:14,marginBottom:10,borderLeft:"4px solid #2980B9"}}>
                  <div style={{fontWeight:600}}>{cmd.type} - {cmd.quantite ? cmd.quantite.toLocaleString() : "-"} BTC</div>
                  <div style={{fontSize:12,color:"#555",marginTop:2}}>Client: {cmd.client || "-"} | Valide par: {cmd.validePar || "-"}</div>
                </div>
              ))
            )}
            <h3 style={{marginBottom:10,marginTop:20,color:"#27AE60"}}>Commandes livrees ({cmdLivrees.length})</h3>
            {cmdLivrees.map(cmd => (
              <div key={cmd.id} style={{background:"#EAFAF1",borderRadius:12,padding:14,marginBottom:10,borderLeft:"4px solid #27AE60"}}>
                <div style={{fontWeight:600}}>{cmd.type} - {cmd.quantite ? cmd.quantite.toLocaleString() : "-"} BTC</div>
                <div style={{fontSize:12,color:"#555",marginTop:2}}>Client: {cmd.client || "-"}</div>
              </div>
            ))}
          </div>
        )}

        {tab === "finance" && (
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Valeur financiere du stock</h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:20}}>
              {TYPES_BTC.map(type => {
                var s = stocks[type] || {};
                var total = (s.sec || 0) + (s.sechage || 0);
                var valeur = total * (prix[type] || 0);
                return (
                  <div key={type} style={{background:"white",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
                    <div style={{fontWeight:700,marginBottom:6}}>{type}</div>
                    <div style={{fontSize:13,color:"#666"}}>Stock total: {total.toLocaleString()}</div>
                    <div style={{fontSize:15,fontWeight:700,color:"#8B1A10",marginTop:6}}>{valeur.toLocaleString()} FCFA</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"#8B1A10",color:"white",borderRadius:12,padding:18,display:"inline-block"}}>
              <div style={{fontSize:13,opacity:.8}}>VALEUR TOTALE DU STOCK</div>
              <div style={{fontSize:24,fontWeight:700,marginTop:4}}>
                {TYPES_BTC.reduce((acc,type) => {
                  var s = stocks[type] || {};
                  var total = (s.sec || 0) + (s.sechage || 0);
                  return acc + total * (prix[type] || 0);
                }, 0).toLocaleString()} FCFA
              </div>
            </div>
          </div>
        )}

        {tab === "utilisateurs" && (
          <div className="fade-in">
            <h3 style={{marginBottom:14,color:"#8B1A10"}}>Creer un compte</h3>
            <div style={{background:"white",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",marginBottom:20,maxWidth:400}}>
              <input placeholder="Nom complet" value={newNom} onChange={e=>setNewNom(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
              <input placeholder="Email" value={newEmail} onChange={e=>setNewEmail(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
              <input type="password" placeholder="Mot de passe" value={newPassword} onChange={e=>setNewPassword(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
              <select value={newRole} onChange={e=>setNewRole(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14,background:"white"}}>
                <option value="chef_chantier">Chef de chantier</option>
                <option value="resp_stock">Responsable Stock</option>
                <option value="resp_production">Responsable Production</option>
                <option value="direction">Direction</option>
              </select>
              {msgUser && <div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msgUser.includes("succes")?"#EAFAF1":"#FFECEC",color:msgUser.includes("succes")?"#1E8449":"#C0392B"}}>{msgUser}</div>}
              <button onClick={creerUtilisateur} style={{width:"100%",padding:"10px",background:"#C0392B",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>Creer le compte</button>
            </div>
            <h3 style={{marginBottom:10,color:"#8B1A10"}}>Comptes existants</h3>
            {utilisateurs.map(u => (
              <div key={u.id} style={{background:"white",borderRadius:10,padding:"10px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                <div><div style={{fontWeight:600}}>{u.nom || u.email}</div><div style={{fontSize:12,color:"#888"}}>{u.email} - {u.role}</div></div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function DashboardChef({ user, userData }) {
  const [type, setType] = useState("BTC 14cm");
  const [quantite, setQuantite] = useState("");
  const [client, setClient] = useState("");
  const [notes, setNotes] = useState("");
  const [msg, setMsg] = useState("");
  const [commandes, setCommandes] = useState([]);

  useEffect(() => {
    var unsub = db.collection("commandes").onSnapshot(snap => {
      var all = snap.docs.map(d => Object.assign({id:d.id}, d.data()));
      setCommandes(all.filter(c => c.chefUid === user.uid));
    });
    return unsub;
  }, []);

  const passerCommande = async () => {
    if (!quantite || !client) { setMsg("Remplissez la quantite et le client"); return; }
    try {
      await db.collection("commandes").add({
        type, quantite: parseInt(quantite), client, notes,
        chefUid: user.uid, chefEmail: user.email, chefNom: userData.nom || user.email,
        status: "EnAttente",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      setMsg("Commande envoyee ! En attente de validation Direction.");
      setQuantite(""); setClient(""); setNotes("");
    } catch(e) { setMsg("Erreur: " + e.message); }
  };

  var enAttente = commandes.filter(c => c.status === "EnAttente");
  var validees = commandes.filter(c => c.status === "Validee" || c.status === "Livree");
  var refusees = commandes.filter(c => c.status === "Refusee");

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#1A5276,#2980B9)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontSize:22}}>👷</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Chef de chantier - {userData.nom || user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:14,color:"#1A5276"}}>Passer une commande</h3>
        <div style={{background:"white",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",maxWidth:420,marginBottom:24}}>
          <select value={type} onChange={e=>setType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,background:"white",fontSize:14}}>
            {TYPES_BTC.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          <input type="number" placeholder="Quantite de BTC" value={quantite} onChange={e=>setQuantite(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
          <input placeholder="Nom du client" value={client} onChange={e=>setClient(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,fontSize:14}} />
          <textarea placeholder="Notes (optionnel)" value={notes} onChange={e=>setNotes(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14,resize:"vertical",minHeight:60}} />
          {msg && <div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msg.includes("envoyee")?"#EBF5FB":"#FFECEC",color:msg.includes("envoyee")?"#1A5276":"#C0392B"}}>{msg}</div>}
          <button onClick={passerCommande} style={{width:"100%",padding:"10px",background:"#2980B9",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Envoyer la commande</button>
        </div>
        <h3 style={{marginBottom:10,color:"#1A5276"}}>Mes commandes ({commandes.length})</h3>
        {commandes.length === 0 ? <p style={{color:"#888"}}>Aucune commande pour l'instant.</p> : (
          commandes.map(c => (
            <div key={c.id} style={{background:"white",borderRadius:10,padding:"12px 16px",marginBottom:10,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderLeft:"4px solid "+(c.status==="Livree"?"#27AE60":c.status==="Validee"?"#2980B9":c.status==="Refusee"?"#E74C3C":"#E67E22")}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontWeight:600}}>{c.type} - {c.quantite ? c.quantite.toLocaleString() : "-"} BTC</div>
                <span style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:c.status==="Livree"?"#EAFAF1":c.status==="Validee"?"#EBF5FB":c.status==="Refusee"?"#FFECEC":"#FEF9E7",color:c.status==="Livree"?"#1E8449":c.status==="Validee"?"#1A5276":c.status==="Refusee"?"#C0392B":"#B7950B"}}>{c.status}</span>
              </div>
              <div style={{fontSize:12,color:"#888",marginTop:4}}>Client: {c.client || "-"}</div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function DashboardStock({ user, userData }) {
  const [commandes, setCommandes] = useState([]);
  const [stocks, setStocks] = useState({});

  useEffect(() => {
    var unsubCmd = db.collection("commandes").where("status","==","Validee").onSnapshot(snap => {
      setCommandes(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    var unsubStock = db.collection("stocks").onSnapshot(snap => {
      var s = {};
      snap.docs.forEach(d => { s[d.id] = d.data(); });
      setStocks(s);
    });
    return () => { unsubCmd(); unsubStock(); };
  }, []);

  const marquerEnvoye = async (cmdId, type, quantite) => {
    var s = stocks[type] || {};
    var newSec = Math.max(0, (s.sec || 0) - quantite);
    await db.collection("commandes").doc(cmdId).update({ status: "Livree", livrePar: userData.nom || user.email, livreAt: firebase.firestore.FieldValue.serverTimestamp() });
    await db.collection("stocks").doc(type).set({ sec: newSec, sechage: s.sechage || 0 }, { merge: true });
  };

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#145A32,#1E8449)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontSize:22}}>📦</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Responsable Stock - {userData.nom || user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>
        <h3 style={{marginBottom:14,color:"#145A32"}}>Etat du stock</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10,marginBottom:24}}>
          {TYPES_BTC.map(type => {
            var s = stocks[type] || {};
            var sec = s.sec || 0;
            var sechage = s.sechage || 0;
            var total = sec + sechage;
            var couleur = couleurUrgence(total);
            return (
              <div key={type} style={{background:"white",borderRadius:12,padding:14,boxShadow:"0 2px 6px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{type}</div>
                <div style={{fontSize:12,color:"#666"}}>Sec: <strong>{sec.toLocaleString()}</strong></div>
                <div style={{fontSize:12,color:"#666"}}>Sechage: <strong>{sechage.toLocaleString()}</strong></div>
                <div style={{fontSize:13,fontWeight:700,color:couleur,marginTop:4}}>Total: {total.toLocaleString()}</div>
              </div>
            );
          })}
        </div>
        <h3 style={{marginBottom:10,color:"#145A32"}}>Commandes a preparer ({commandes.length})</h3>
        {commandes.length === 0 ? <p style={{color:"#888"}}>Aucune commande validee en attente de preparation.</p> : (
          commandes.map(cmd => (
            <div key={cmd.id} style={{background:"white",borderRadius:12,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid #2980B9"}}>
              <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15}}>{cmd.type} - {cmd.quantite ? cmd.quantite.toLocaleString() : "-"} BTC</div>
                  <div style={{fontSize:12,color:"#666",marginTop:4}}>Client: {cmd.client || "-"} | Valide par: {cmd.validePar || "Direction"}</div>
                </div>
                <button onClick={()=>marquerEnvoye(cmd.id, cmd.type, cmd.quantite || 0)} style={{background:"#1E8449",color:"white",border:"none",padding:"9px 18px",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:13}}>Commande envoyee ✓</button>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function DashboardProduction({ user, userData }) {
  const [stocks, setStocks] = useState({});
  const [productions, setProductions] = useState([]);
  const [saisieType, setSaisieType] = useState("");
  const [saisieQte, setSaisieQte] = useState("");
  const [saisiePhase, setSaisiePhase] = useState("sec");
  const [msg, setMsg] = useState("");
  const dateAujourdHui = new Date().toLocaleDateString("fr-FR");

  useEffect(() => {
    var unsubStock = db.collection("stocks").onSnapshot(snap => {
      var s = {};
      snap.docs.forEach(d => { s[d.id] = d.data(); });
      setStocks(s);
    });
    var unsubProd = db.collection("productions").onSnapshot(snap => {
      setProductions(snap.docs.map(d => Object.assign({id:d.id}, d.data())));
    });
    return () => { unsubStock(); unsubProd(); };
  }, []);

  // Trier les types BTC par urgence : du plus petit stock au plus grand
  var typesParUrgence = TYPES_BTC.map(function(type) {
    var s = stocks[type] || {};
    var sec = s.sec || 0;
    var sechage = s.sechage || 0;
    var total = sec + sechage;
    return { type: type, sec: sec, sechage: sechage, total: total };
  }).sort(function(a, b) { return a.total - b.total; });

  var productionsAujourdHui = productions.filter(function(p) { return p.date === dateAujourdHui; });

  var enregistrerProduction = async function() {
    if (!saisieType || !saisieQte) { setMsg("Choisissez un type et entrez la quantite"); return; }
    var qte = parseInt(saisieQte);
    if (isNaN(qte) || qte <= 0) { setMsg("Quantite invalide"); return; }
    try {
      await db.collection("productions").add({
        type: saisieType, quantite: qte, phase: saisiePhase,
        date: dateAujourdHui,
        responsable: userData.nom || user.email,
        responsableUid: user.uid,
        statut: "Valide",
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      // Mettre a jour le stock
      var s = stocks[saisieType] || {};
      var updateData = {};
      if (saisiePhase === "sec") {
        updateData.sec = (s.sec || 0) + qte;
      } else {
        updateData.sechage = (s.sechage || 0) + qte;
      }
      await db.collection("stocks").doc(saisieType).set(updateData, { merge: true });
      setMsg("Production enregistree ! Stock mis a jour.");
      setSaisieQte("");
    } catch(e) { setMsg("Erreur: " + e.message); }
  };

  return (
    <div style={{minHeight:"100vh",background:"#FDF6E3"}}>
      <div style={{background:"linear-gradient(90deg,#4A235A,#6C3483)",color:"white",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontSize:22}}>🏭</span> <strong>BTC Manager</strong> <span style={{fontSize:12,opacity:.8}}>| Resp. Production - {userData.nom || user.email}</span></div>
        <button onClick={()=>auth.signOut()} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.3)",color:"white",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:13}}>Deconnexion</button>
      </div>
      <div style={{padding:20}}>

        <h3 style={{marginBottom:6,color:"#4A235A"}}>Priorites de production - {dateAujourdHui}</h3>
        <p style={{fontSize:12,color:"#888",marginBottom:14}}>Stock cible: {STOCK_CIBLE.toLocaleString()} BTC | Alerte si total (sec + sechage) inferieur a {STOCK_ALERTE.toLocaleString()} BTC</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12,marginBottom:24}}>
          {typesParUrgence.map(function(item, idx) {
            var couleur = couleurUrgence(item.total);
            var pct = Math.min(100, Math.round(item.total / STOCK_CIBLE * 100));
            var manque = Math.max(0, STOCK_CIBLE - item.total);
            return (
              <div key={item.type} style={{background:"white",borderRadius:12,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",borderLeft:"4px solid "+couleur,position:"relative"}}>
                <div style={{position:"absolute",top:12,right:12,background:couleur,color:"white",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>#{idx+1}</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:8,paddingRight:50}}>{item.type}</div>
                <div style={{fontSize:12,color:"#666"}}>Stock sec: <strong style={{color:"#333"}}>{item.sec.toLocaleString()}</strong></div>
                <div style={{fontSize:12,color:"#666"}}>En sechage: <strong style={{color:"#333"}}>{item.sechage.toLocaleString()}</strong></div>
                <div style={{margin:"8px 0 4px",background:"#EEE",borderRadius:4,height:8}}>
                  <div style={{height:8,borderRadius:4,background:couleur,width:pct+"%"}}></div>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                  <div style={{fontSize:13,fontWeight:700,color:couleur}}>{item.total.toLocaleString()} / {STOCK_CIBLE.toLocaleString()}</div>
                  <div style={{fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10,background:couleur,color:"white"}}>{libelleUrgence(item.total)}</div>
                </div>
                {item.total < STOCK_CIBLE && <div style={{fontSize:11,color:"#888",marginTop:4}}>A produire: <strong style={{color:couleur}}>{manque.toLocaleString()} BTC</strong></div>}
              </div>
            );
          })}
        </div>

        <h3 style={{marginBottom:14,color:"#4A235A"}}>Enregistrer une production</h3>
        <div style={{background:"white",borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.08)",maxWidth:420,marginBottom:24}}>
          <select value={saisieType} onChange={e=>setSaisieType(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,background:"white",fontSize:14}}>
            <option value="">-- Choisir le type BTC (priorite suggere) --</option>
            {typesParUrgence.map(function(item) {
              return <option key={item.type} value={item.type}>{item.type} (stock: {item.total.toLocaleString()} BTC)</option>;
            })}
          </select>
          <select value={saisiePhase} onChange={e=>setSaisiePhase(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:10,background:"white",fontSize:14}}>
            <option value="sec">Stock sec (seche)</option>
            <option value="sechage">En sechage (frais)</option>
          </select>
          <input type="number" placeholder="Quantite produite" value={saisieQte} onChange={e=>setSaisieQte(e.target.value)} style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",marginBottom:12,fontSize:14}} />
          {msg && <div style={{padding:"8px 12px",borderRadius:8,marginBottom:10,fontSize:13,background:msg.includes("enregistree")?"#EAFAF1":"#FFECEC",color:msg.includes("enregistree")?"#1E8449":"#C0392B"}}>{msg}</div>}
          <button onClick={enregistrerProduction} style={{width:"100%",padding:"10px",background:"#6C3483",color:"white",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer",fontSize:14}}>Enregistrer la production</button>
        </div>
        <h3 style={{marginBottom:10,color:"#4A235A"}}>Productions enregistrees aujourd'hui ({productionsAujourdHui.length})</h3>
        {productionsAujourdHui.length === 0 ? <p style={{color:"#888"}}>Aucune production enregistree aujourd'hui.</p> : (
          productionsAujourdHui.map(p => (
            <div key={p.id} style={{background:"white",borderRadius:10,padding:"10px 16px",marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontWeight:600}}>{p.type} <span style={{fontSize:12,color:"#888"}}>({p.phase === "sec" ? "sec" : "sechage"})</span></div>
                <div style={{fontSize:12,color:"#666"}}>+{p.quantite ? p.quantite.toLocaleString() : "-"} BTC</div>
              </div>
              <span style={{background:"#EAFAF1",color:"#1E8449",borderRadius:10,padding:"2px 10px",fontSize:12,fontWeight:700}}>Enregistre</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

function App() {
  const [user, setUser] = useState(null);
  const [userData, setUserData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    var unsub = auth.onAuthStateChanged(async (u) => {
      if (u) {
        try {
          var doc = await db.collection("users").doc(u.uid).get();
          if (doc.exists) {
            setUserData(doc.data());
          } else {
            setUserData({ role: "inconnu" });
          }
        } catch(e) {
          setUserData({ role: "inconnu" });
        }
        setUser(u);
      } else {
        setUser(null);
        setUserData(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  if (loading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#8B1A10,#C0392B)"}}>
      <div style={{color:"white",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>🧱</div>
        <div style={{fontSize:18,fontWeight:700}}>BTC Manager</div>
        <div style={{fontSize:13,opacity:.8,marginTop:4}}>Chargement...</div>
      </div>
    </div>
  );

  if (!user) return <Login />;

  var role = (userData && userData.role) ? userData.role.trim().toLowerCase() : "";

  if (loading || !userData) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FDF6E3"}}>
      <div style={{textAlign:"center",color:"#888"}}>
        <div style={{fontSize:40}}>⏳</div>
        <p style={{marginTop:8}}>Chargement du profil...</p>
      </div>
    </div>
  );

  if (role === "direction") return <DashboardDirection user={user} userData={userData} />;
  if (role === "chef_chantier") return <DashboardChef user={user} userData={userData} />;
  if (role === "resp_stock") return <DashboardStock user={user} userData={userData} />;
  if (role === "resp_production") return <DashboardProduction user={user} userData={userData} />;

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FDF6E3"}}>
      <div style={{textAlign:"center",padding:40,background:"white",borderRadius:16,boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
        <div style={{fontSize:40,marginBottom:12}}>⚠️</div>
        <h3 style={{color:"#C0392B",marginBottom:8}}>Role non reconnu</h3>
        <p style={{color:"#888",marginBottom:4}}>Role detecte: "{role}"</p>
        <p style={{color:"#888",fontSize:13}}>Contactez l'administrateur.</p>
        <button onClick={()=>auth.signOut()} style={{marginTop:16,padding:"8px 20px",background:"#C0392B",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700}}>Deconnexion</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
